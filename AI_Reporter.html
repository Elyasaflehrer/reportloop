// Manager dashboard: own question list, schedules, correspondences (RBAC plan).

const ManagerWorkspace = () => {
  const { session } = useSession();
  const mid = session.id; // manager's own user ID — scope derived from ManagerGroup joins in Phase 5
  const [tab, setTab] = useState("questions");

  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "32px 36px" }}>
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ fontSize: 22, fontWeight: 700 }}>Manager workspace</h1>
        <p style={{ color: "var(--text-2)", marginTop: 3 }}>
          Partition <b>{mid}</b> — questions, schedules, and correspondences for properties Admin assigned to you.
        </p>
      </div>

      <div
        style={{
          display: "flex",
          gap: 6,
          marginBottom: 24,
          background: "var(--surface)",
          border: "1px solid var(--border)",
          borderRadius: 10,
          padding: 4,
          width: "fit-content",
          boxShadow: "var(--shadow)",
        }}
      >
        <Tab label="Questions" active={tab === "questions"} onClick={() => setTab("questions")} />
        <Tab label="Schedule" active={tab === "schedule"} onClick={() => setTab("schedule")} />
        <Tab label="Correspondences" active={tab === "corr"} onClick={() => setTab("corr")} />
      </div>

      {tab === "questions" && <ManagerQuestionsPanel managerId={mid} />}
      {tab === "schedule" && <ManagerSchedulePanel managerId={mid} />}
      {tab === "corr" && (
        <History
          managerFilterId={mid}
          title="Correspondences"
          subtitle="Threads for properties under your manager partition only."
        />
      )}
    </div>
  );
};

const ManagerQuestionsPanel = ({ managerId }) => {
  const [all, setAll] = useState(() => loadManagerQuestions());
  const list = all[managerId] || [];
  const [text, setText] = useState("");
  const [edit, setEdit] = useState(null); // { id, text }
  const [qSearch, setQSearch] = useState("");

  const persistList = (nextList) => {
    const next = { ...all, [managerId]: nextList };
    setAll(next);
    saveManagerQuestions(next);
  };

  const add = () => {
    if (!text.trim()) {
      toastError("Question text is required.");
      return;
    }
    const id = Math.max(0, ...list.map((q) => q.id)) + 1;
    persistList([...list, { id, text: text.trim() }]);
    setText("");
    toastSuccess("Question added.");
  };

  const remove = (id) => {
    persistList(list.filter((q) => q.id !== id));
    toastSuccess("Question removed.");
  };

  const saveEdit = () => {
    if (!edit || !edit.text.trim()) {
      toastError("Could not save question: text is required.");
      return;
    }
    persistList(list.map((q) => (q.id === edit.id ? { ...q, text: edit.text.trim() } : q)));
    setEdit(null);
    toastSuccess("Question updated.");
  };

  const filteredList = list.filter((q) =>
    !qSearch.trim() || (q.text || "").toLowerCase().includes(qSearch.trim().toLowerCase())
  );

  return (
    <div style={{ maxWidth: 640 }}>
      <div style={{ marginBottom: 12, fontSize: 12, color: "var(--text-3)" }}>
        {list.length} question{list.length !== 1 ? "s" : ""} · All optional
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <input placeholder="New question text" value={text} onChange={(e) => setText(e.target.value)} style={inputSx} />
        <button type="button" onClick={add} style={{ background: "var(--primary)", color: "#fff", borderRadius: 8, padding: "0 16px", fontWeight: 600 }}>
          Add
        </button>
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
        <input placeholder="Search questions…" value={qSearch} onChange={(e) => setQSearch(e.target.value)} style={{ ...inputSx, marginBottom: 0 }} />
      </div>
      <div style={{ border: "1px solid var(--border)", borderRadius: 10, overflow: "hidden", maxHeight: 480, overflowY: "auto" }}>
        {filteredList.map((q) => (
          <div key={q.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 14px", borderBottom: "1px solid var(--border)", fontSize: 14 }}>
            <span>{q.text}</span>
            <div style={{ display: "flex", gap: 8 }}>
              <button
                type="button"
                onClick={() =>
                  setEdit({
                    id: q.id,
                    text: q.text,
                    __baselineText: q.text,
                  })
                }
                style={{ fontWeight: 600, color: "var(--primary)", fontSize: 13 }}
              >
                Edit
              </button>
              <button type="button" onClick={() => remove(q.id)} style={{ color: "var(--red)", fontWeight: 600 }}>
                Remove
              </button>
            </div>
          </div>
        ))}
        {filteredList.length === 0 && <div style={{ padding: 14, color: "var(--text-3)", fontSize: 14 }}>No questions match.</div>}
      </div>
      {edit && (
        <Modal
          title="Edit question"
          onClose={() => {
            const dirty = String(edit.text || "").trim() !== String(edit.__baselineText || "").trim();
            if (dirty && !confirmDiscardUnsaved("question editor")) return;
            setEdit(null);
          }}
          width={440}
        >
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <textarea value={edit.text} onChange={(e) => setEdit((x) => ({ ...x, text: e.target.value }))} rows={3} style={{ ...inputSx, resize: "vertical" }} />
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button
                type="button"
                onClick={() => {
                  const dirty = String(edit.text || "").trim() !== String(edit.__baselineText || "").trim();
                  if (dirty && !confirmDiscardUnsaved("question editor")) return;
                  setEdit(null);
                }}
                style={{ border: "1px solid var(--border)", borderRadius: 8, padding: "8px 16px" }}
              >
                Cancel
              </button>
              <button type="button" onClick={saveEdit} style={{ background: "var(--primary)", color: "#fff", borderRadius: 8, padding: "8px 16px", fontWeight: 600 }}>
                Save
              </button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

const ManagerSchedulePanel = ({ managerId }) => {
  const [all, setAll] = useState(() => loadManagerSchedules());
  const list = all[managerId] || [];
  const roster = employeesForManager(managerId);
  const questions = loadManagerQuestions()[managerId] || [];

  const [showAddModal, setShowAddModal] = useState(false);
  const [label, setLabel] = useState("Weekly send");
  const [day, setDay] = useState("Sunday");
  const [time, setTime] = useState("08:00");
  const [mode, setMode] = useState("all");
  const [subsetIds, setSubsetIds] = useState([]);
  const [newQIds, setNewQIds] = useState(() => new Set());
  const [modalQSearch, setModalQSearch] = useState("");
  const [modalEmpSearch, setModalEmpSearch] = useState("");
  const [reviewDraft, setReviewDraft] = useState(null);
  const [undoRemovedJob, setUndoRemovedJob] = useState(null); // { job, expiresAt }

  const persist = (nextList) => {
    const next = { ...all, [managerId]: nextList };
    setAll(next);
    saveManagerSchedules(next);
  };

  const openAddModal = () => {
    const qs = loadManagerQuestions()[managerId] || [];
    setLabel("Weekly send");
    setDay("Sunday");
    setTime("08:00");
    setMode("all");
    setSubsetIds([]);
    setModalQSearch("");
    setModalEmpSearch("");
    setNewQIds(new Set(qs.length ? qs.map((q) => q.id) : [1]));
    setReviewDraft(null);
    setShowAddModal(true);
  };

  const buildPendingScheduleDraft = () => {
    if (!String(label || "").trim()) {
      toastError("Schedule label is required.");
      return null;
    }
    const picked = questions.filter((q) => newQIds.has(q.id)).map((q) => q.id);
    const qids = picked.length ? picked : questions.length ? [questions[0].id] : [1];
    return {
      label: String(label || "").trim(),
      day,
      time,
      active: true,
      recipientMode: mode,
      employeeIds: mode === "subset" ? subsetIds : [],
      questionIds: qids,
    };
  };

  const openReviewForAdd = () => {
    const draft = buildPendingScheduleDraft();
    if (!draft) return;
    setReviewDraft(draft);
  };

  const confirmAddJob = () => {
    if (!reviewDraft) return;
    const id = Math.max(0, ...list.map((j) => j.id)) + 1;
    persist([...list, { id, ...reviewDraft }]);
    setSubsetIds([]);
    setShowAddModal(false);
    setReviewDraft(null);
    toastSuccess("Schedule added.");
  };

  const remove = (id) => {
    const target = list.find((j) => j.id === id);
    if (!target) return;
    if (!confirm(`Remove schedule "${target.label}"?`)) return;
    const next = list.filter((j) => j.id !== id);
    persist(next);
    const expiresAt = Date.now() + 8000;
    setUndoRemovedJob({ job: target, expiresAt });
    window.setTimeout(() => {
      setUndoRemovedJob((cur) => {
        if (!cur) return null;
        return cur.expiresAt === expiresAt ? null : cur;
      });
    }, 8200);
    toastSuccess("Schedule removed.");
  };

  const undoRemove = () => {
    if (!undoRemovedJob) return;
    const target = undoRemovedJob.job;
    const restored = [...list, target].sort((a, b) => a.id - b.id);
    persist(restored);
    setUndoRemovedJob(null);
    toastSuccess("Removal undone.");
  };

  const toggleSubset = (empId) => {
    setSubsetIds((s) => (s.includes(empId) ? s.filter((x) => x !== empId) : [...s, empId]));
  };

  const patchJob = (id, patch) => {
    persist(list.map((j) => (j.id === id ? { ...j, ...patch } : j)));
    if (Object.prototype.hasOwnProperty.call(patch, "active")) {
      toastSuccess(`Schedule ${patch.active ? "activated" : "paused"}.`);
    }
  };

  const toggleJobQuestion = (job, qid) => {
    const cur = new Set(job.questionIds || []);
    if (cur.has(qid)) cur.delete(qid);
    else cur.add(qid);
    const next = [...cur];
    if (!next.length) return;
    patchJob(job.id, { questionIds: next });
    toastSuccess("Schedule questions updated.");
  };

  const toggleNewQuestion = (qid) => {
    setNewQIds((prev) => {
      const n = new Set(prev);
      if (n.has(qid)) n.delete(qid);
      else n.add(qid);
      return n;
    });
  };

  const qModalFilter = (q) => {
    if (!modalQSearch.trim()) return true;
    return (q.text || "").toLowerCase().includes(modalQSearch.trim().toLowerCase());
  };
  const empModalFilter = (e) => {
    if (!modalEmpSearch.trim()) return true;
    const t = modalEmpSearch.trim().toLowerCase();
    return (e.name || "").toLowerCase().includes(t) || String(e.id).includes(t);
  };
  const questionsInModal = questions.filter(qModalFilter);
  const rosterInModal = roster.filter(empModalFilter);
  const isAddScheduleDirty = () => {
    const labelDirty = String(label || "").trim() !== "Weekly send";
    const dayDirty = day !== "Sunday";
    const timeDirty = time !== "08:00";
    const modeDirty = mode !== "all";
    const subsetDirty = subsetIds.length > 0;
    const desiredDefault = new Set((questions.length ? questions : [{ id: 1 }]).map((q) => q.id));
    const draftSet = new Set(newQIds);
    const questionDirty =
      draftSet.size !== desiredDefault.size || [...draftSet].some((id) => !desiredDefault.has(id));
    return labelDirty || dayDirty || timeDirty || modeDirty || subsetDirty || questionDirty;
  };
  const requestCloseAddSchedule = () => {
    if (isAddScheduleDirty() && !confirmDiscardUnsaved("schedule editor")) return;
    setReviewDraft(null);
    setShowAddModal(false);
  };

  return (
    <div style={{ maxWidth: 720 }}>
      <p style={{ color: "var(--text-2)", marginBottom: 16, fontSize: 14 }}>
        Mock schedules (localStorage). Pick which questions to send; toggle active without deleting a row.
      </p>
      <div style={{ fontSize: 12, color: "var(--text-2)", marginBottom: 12 }}>
        What this affects: schedules decide who receives prompts and which questions are asked each cycle.
      </div>

      <div style={{ marginBottom: 20 }}>
        <button type="button" onClick={openAddModal} style={{ background: "var(--primary)", color: "#fff", borderRadius: 8, padding: "9px 18px", fontWeight: 600 }}>
          Add schedule…
        </button>
      </div>
      {undoRemovedJob && (
        <div style={{ marginBottom: 16, background: "var(--amber-bg)", border: "1px solid var(--amber)", borderRadius: 8, padding: "10px 12px", display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <span style={{ fontSize: 13, color: "var(--text)" }}>
            Removed <b>{undoRemovedJob.job.label}</b>. You can undo for a few seconds.
          </span>
          <button type="button" onClick={undoRemove} style={{ fontSize: 12, fontWeight: 700, color: "var(--primary)" }}>
            Undo
          </button>
        </div>
      )}

      {showAddModal && (
        <Modal title="Add schedule" onClose={requestCloseAddSchedule} width={560}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14, maxHeight: "min(78vh, 640px)" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 120px 100px", gap: 10 }}>
              <input placeholder="Label" value={label} onChange={(e) => setLabel(e.target.value)} style={inputSx} />
              <select value={day} onChange={(e) => setDay(e.target.value)} style={inputSx}>
                {["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"].map((d) => (
                  <option key={d} value={d}>
                    {d}
                  </option>
                ))}
              </select>
              <input type="time" value={time} onChange={(e) => setTime(e.target.value)} style={inputSx} />
            </div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text-3)", marginBottom: 6 }}>Questions to include</div>
              <input placeholder="Search questions…" value={modalQSearch} onChange={(e) => setModalQSearch(e.target.value)} style={{ ...inputSx, marginBottom: 8 }} />
              <div style={{ border: "1px solid var(--border)", borderRadius: 8, maxHeight: 200, overflowY: "auto", padding: "6px 8px", display: "flex", flexDirection: "column", gap: 6 }}>
                {questionsInModal.map((q) => (
                  <label key={q.id} style={{ fontSize: 14 }}>
                    <input type="checkbox" checked={newQIds.has(q.id)} onChange={() => toggleNewQuestion(q.id)} /> {q.text}
                  </label>
                ))}
                {questions.length === 0 && <span style={{ fontSize: 13, color: "var(--text-3)" }}>Add questions in the Questions tab first.</span>}
                {questions.length > 0 && questionsInModal.length === 0 && <span style={{ fontSize: 13, color: "var(--text-3)" }}>No questions match search.</span>}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text-3)", marginBottom: 6 }}>Recipients</div>
              <div style={{ display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
                <label style={{ fontSize: 14 }}>
                  <input type="radio" checked={mode === "all"} onChange={() => setMode("all")} /> All roster ({roster.length})
                </label>
                <label style={{ fontSize: 14 }}>
                  <input type="radio" checked={mode === "subset"} onChange={() => setMode("subset")} /> Subset
                </label>
              </div>
              {mode === "subset" && (
                <>
                  <input placeholder="Search employees…" value={modalEmpSearch} onChange={(e) => setModalEmpSearch(e.target.value)} style={{ ...inputSx, marginTop: 10, marginBottom: 8 }} />
                  <div style={{ border: "1px solid var(--border)", borderRadius: 8, maxHeight: 200, overflowY: "auto", padding: "6px 8px", display: "flex", flexDirection: "column", gap: 6 }}>
                    {rosterInModal.map((e) => (
                      <label key={e.id} style={{ fontSize: 14 }}>
                        <input type="checkbox" checked={subsetIds.includes(e.id)} onChange={() => toggleSubset(e.id)} /> {e.name}
                      </label>
                    ))}
                    {roster.length === 0 && <span style={{ fontSize: 13, color: "var(--text-3)" }}>No roster for this partition.</span>}
                    {roster.length > 0 && rosterInModal.length === 0 && <span style={{ fontSize: 13, color: "var(--text-3)" }}>No employees match search.</span>}
                  </div>
                </>
              )}
            </div>
            <div style={{ fontSize: 12, color: "var(--text-2)", background: "var(--surface-alt)", border: "1px solid var(--border)", borderRadius: 8, padding: "8px 10px" }}>
              Recipient scope: <b>{mode === "all" ? "All roster" : "Subset"}</b> · Recipient count: <b>{mode === "all" ? roster.length : subsetIds.length}</b> · Questions selected: <b>{newQIds.size}</b>
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: "auto", paddingTop: 8 }}>
              <button type="button" onClick={requestCloseAddSchedule} style={{ border: "1px solid var(--border)", borderRadius: 8, padding: "8px 16px" }}>
                Cancel
              </button>
              <button type="button" onClick={openReviewForAdd} style={{ background: "var(--primary)", color: "#fff", borderRadius: 8, padding: "8px 16px", fontWeight: 600 }}>
                Review
              </button>
            </div>
          </div>
        </Modal>
      )}
      {reviewDraft && (
        <Modal title="Review schedule before save" onClose={() => setReviewDraft(null)} width={520}>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ fontSize: 13, color: "var(--text-2)" }}>
              Confirm the details below. This prevents ambiguity about who will receive the schedule.
            </div>
            <div style={{ background: "var(--surface-alt)", border: "1px solid var(--border)", borderRadius: 8, padding: "10px 12px", display: "grid", gap: 8, fontSize: 13 }}>
              <div><b>Label:</b> {reviewDraft.label}</div>
              <div><b>When:</b> {reviewDraft.day} @ {reviewDraft.time}</div>
              <div><b>Recipients:</b> {reviewDraft.recipientMode === "all" ? `All roster (${roster.length})` : `Subset (${reviewDraft.employeeIds.length})`}</div>
              <div><b>Questions:</b> {reviewDraft.questionIds.length} selected</div>
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button type="button" onClick={() => setReviewDraft(null)} style={{ border: "1px solid var(--border)", borderRadius: 8, padding: "8px 16px" }}>
                Back
              </button>
              <button type="button" onClick={confirmAddJob} style={{ background: "var(--primary)", color: "#fff", borderRadius: 8, padding: "8px 16px", fontWeight: 600 }}>
                Confirm and save
              </button>
            </div>
          </div>
        </Modal>
      )}

      <div style={{ border: "1px solid var(--border)", borderRadius: 10, overflow: "hidden" }}>
        {list.map((j) => {
          const active = j.active !== false;
          return (
            <div key={j.id} style={{ padding: "12px 14px", borderBottom: "1px solid var(--border)", fontSize: 14 }}>
              <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 10, marginBottom: 8 }}>
                <b>{j.label}</b>
                {!active && (
                  <span style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.03em", borderRadius: 99, padding: "2px 7px", background: "var(--border)", color: "var(--text-3)" }}>
                    Paused
                  </span>
                )}
                <span style={{ color: "var(--text-3)" }}>
                  {j.day} @ {j.time}
                </span>
                <span style={{ color: "var(--text-3)" }}>· recipients: {j.recipientMode === "all" ? "all roster" : `subset (${(j.employeeIds || []).length})`}</span>
                <label style={{ marginLeft: "auto", fontSize: 13, display: "flex", alignItems: "center", gap: 6 }}>
                  <input type="checkbox" checked={active} onChange={() => patchJob(j.id, { active: !active })} /> Active
                </label>
                <button type="button" onClick={() => remove(j.id)} style={{ color: "var(--red)", fontWeight: 600 }}>
                  Remove
                </button>
              </div>
              <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text-3)", marginBottom: 4 }}>Questions</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {questions.map((q) => (
                  <label key={q.id} style={{ fontSize: 13 }}>
                    <input
                      type="checkbox"
                      checked={(j.questionIds || []).includes(q.id)}
                      onChange={() => toggleJobQuestion(j, q.id)}
                    />{" "}
                    {q.text}
                  </label>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

</script>

  <script type="text/babel" data-presets="react">
/* source: app/08-App.jsx */
// App shell: mock session (RBAC plan), role-based routes, ReactDOM root.

const allowedPages = (role) => {
  if (role === "admin") return ["admin", "history", "integrations"];
  if (role === "manager") return ["manager", "history"];
  if (role === "viewer") return ["history"];
  return [];
};

const LoginWall = () => {
  const { login } = useSession();
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);

  if (!supabaseClient) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--bg)", padding: 24 }}>
        <div style={{ background: "var(--surface)", padding: 32, borderRadius: 12, maxWidth: 440, width: "100%", border: "1px solid var(--border)", boxShadow: "var(--shadow)" }}>
          <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 12 }}>AI Reporter</h1>
          <p style={{ color: "var(--red)", fontSize: 14, lineHeight: 1.5 }}>
            Supabase is not configured. Set <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> in the script before deploying.
          </p>
        </div>
      </div>
    );
  }

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(null);
    setLoading(true);
    try {
      await login({ email, password });
    } catch (err) {
      setError(err.message || "Sign in failed. Check your email and password.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--bg)", padding: 24 }}>
      <div style={{ background: "var(--surface)", padding: 32, borderRadius: 12, maxWidth: 440, width: "100%", border: "1px solid var(--border)", boxShadow: "var(--shadow)" }}>
        <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Sign in</h1>
        <p style={{ color: "var(--text-2)", fontSize: 14, marginBottom: 24 }}>AI Reporter — Hotel Operations</p>
        <form onSubmit={handleSubmit}>
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", fontSize: 12, fontWeight: 600, marginBottom: 5, color: "var(--text-2)" }}>Email</label>
            <input
              type="email"
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              required
              autoComplete="email"
              style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid var(--border)", fontSize: 14, background: "var(--bg)", color: "var(--text)" }}
            />
          </div>
          <div style={{ marginBottom: 20 }}>
            <label style={{ display: "block", fontSize: 12, fontWeight: 600, marginBottom: 5, color: "var(--text-2)" }}>Password</label>
            <input
              type="password"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              required
              autoComplete="current-password"
              style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid var(--border)", fontSize: 14, background: "var(--bg)", color: "var(--text)" }}
            />
          </div>
          {error && <p style={{ color: "var(--red)", fontSize: 13, marginBottom: 14 }}>{error}</p>}
          <button
            type="submit"
            disabled={loading}
            style={{ width: "100%", padding: 11, borderRadius: 8, background: "var(--primary)", color: "#fff", fontSize: 14, fontWeight: 600, opacity: loading ? 0.7 : 1 }}
          >
            {loading ? "Signing in…" : "Sign in"}
          </button>
        </form>
      </div>
    </div>
  );
};

const ViewerManagerBar = () => {
  const { session, setViewerManager } = useSession();
  if (!session || session.role !== "viewer") return null;
  const ids = session.viewerManagerIds || [];
  if (ids.length <= 1) return null;
  return (
    <div
      style={{
        padding: "8px 16px",
        background: "var(--surface)",
        borderBottom: "1px solid var(--border)",
        display: "flex",
        alignItems: "center",
        gap: 12,
        fontSize: 13,
      }}
    >
      <span style={{ color: "var(--text-2)", fontWeight: 600 }}>Manager context</span>
      <select
        value={session.activeManagerId ?? ""}
        onChange={(e) => setViewerManager(Number(e.target.value))}
        style={{ ...inputSx, width: "auto", minWidth: 200 }}
      >
        {ids.map((mid) => {
          const u = loadPlatformUsers().find((x) => x.role === "manager" && x.managerPartitionId === mid);
          return (
            <option key={mid} value={mid}>
              {u ? u.name : "Manager"} ({mid})
            </option>
          );
        })}
      </select>
    </div>
  );
};

const defaultPageForRole = (role) => {
  if (role === "admin") return "admin";
  if (role === "manager") return "manager";
  if (role === "viewer") return "history";
  return "history";
};

const AppShell = () => {
  const { session, logout } = useSession();
  const [page, setPage] = useState("admin");
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [isMobile, setIsMobile] = useState(() => typeof window !== "undefined" && window.innerWidth < 768);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);

  useEffect(() => {
    if (!session || session.role === "participant") return;
    setPage(defaultPageForRole(session.role));
  }, [session]);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setShowTweaks(true);
      if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
    };
    window.addEventListener("message", handler);
    return () => window.removeEventListener("message", handler);
  }, []);

  useEffect(() => {
    const onToast = (e) => {
      const d = e.detail || {};
      if (!d.message) return;
      setToasts((prev) => [...prev, d]);
      const timeout = d.type === "error" ? 3600 : 2400;
      window.setTimeout(() => {
        setToasts((prev) => prev.filter((t) => t.id !== d.id));
      }, timeout);
    };
    window.addEventListener(UI_TOAST_EVENT, onToast);
    return () => window.removeEventListener(UI_TOAST_EVENT, onToast);
  }, []);

  const onTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: next }, "*");
  };

  if (!session) return <LoginWall />;
  if (session.role === "participant") return <ParticipantPortal />;

  const allowed = allowedPages(session.role);
  const navigate = (p) => {
    if (allowed.includes(p)) { setPage(p); setSidebarOpen(false); }
  };

  const viewerMid = session.role === "viewer" ? session.activeManagerId : null;

  return (
    <div style={{ display: "flex", flexDirection: "column", width: "100%", height: "100vh", overflow: "hidden" }}>
      {isMobile && (
        <button
          type="button"
          aria-label="Open navigation menu"
          onClick={() => setSidebarOpen(true)}
          style={{
            position: "fixed", top: 8, left: 8, zIndex: 98,
            background: "var(--surface)", border: "1px solid var(--border)",
            borderRadius: 8, padding: "6px 10px", fontSize: 18, cursor: "pointer",
            boxShadow: "var(--shadow)", lineHeight: 1,
          }}
        >
          ☰
        </button>
      )}
      <div aria-live="polite" aria-atomic="true" style={{ position: "fixed", top: 12, right: 12, zIndex: 2600, display: "flex", flexDirection: "column", gap: 8, pointerEvents: "none", maxWidth: 360 }}>
        {toasts.map((t) => (
          <div
            key={t.id}
            role={t.type === "error" ? "alert" : "status"}
            style={{
              pointerEvents: "auto",
              background: "var(--surface)",
              border: `1px solid ${t.type === "error" ? "var(--red)" : "var(--border-strong)"}`,
              borderLeft: `4px solid ${t.type === "error" ? "var(--red)" : "var(--green)"}`,
              boxShadow: "var(--shadow-strong)",
              borderRadius: 12,
              padding: "11px 13px",
              color: "var(--text)",
              fontSize: 13,
              lineHeight: 1.4,
            }}
          >
            {t.message}
          </div>
        ))}
      </div>
      <ViewerManagerBar />
      <div style={{ display: "flex", flex: 1, overflow: "auto", minHeight: 0 }}>
        <Sidebar active={page} onNav={navigate} allowedPages={allowed} isMobile={isMobile} isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)} />
        <main style={{ flex: 1, display: "flex", overflow: "auto", background: "var(--bg)", paddingTop: isMobile ? 44 : 0 }}>
          {session.role === "admin" && page === "admin" && <AdminDashboard onNav={navigate} />}
          {session.role === "manager" && page === "manager" && <ManagerWorkspace />}
          {page === "history" && (
            <History
              managerFilterId={session.role === "viewer" ? viewerMid : session.role === "manager" ? session.id : null}
              title="Correspondences"
              subtitle={
                session.role === "viewer"
                  ? "Threads for the selected manager partition (Admin-assigned)."
                  : session.role === "manager"
                    ? "Your partition only."
                    : undefined
              }
            />
          )}
          {page === "dashboard" && <Dashboard onNav={navigate} />}
          {page === "broadcast" && <BroadcastCompose onSent={() => navigate("history")} />}
          {page === "monitor" && <Monitor />}
          {page === "integrations" && session.role === "admin" && <Integrations />}
        </main>
        <TweaksPanel show={showTweaks} tweaks={tweaks} onTweak={onTweak} />
      </div>
    </div>
  );
};

const App = () => (
  <SessionProvider>
    <AppShell />
  </SessionProvider>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
