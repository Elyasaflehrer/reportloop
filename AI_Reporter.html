// Supabase auth. JWT stored in memory only — never localStorage.
// Role/scope populated from GET /auth/me in Phase 5; derived from user_metadata until then.

const SessionContext = React.createContext(null);

const useSession = () => {
  const v = React.useContext(SessionContext);
  if (!v) throw new Error("useSession must be used inside SessionProvider");
  return v;
};

// Publishable keys — safe to include in frontend bundle.
// Replace with your Supabase project values before deploying.

const supabaseClient =
  SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

const mapSupabaseSession = (sb) => ({
  id: sb.user.id,
  email: sb.user.email,
  name: sb.user.user_metadata?.name || sb.user.email || "User",
  initials: ((sb.user.user_metadata?.name || sb.user.email || "??").slice(0, 2)).toUpperCase(),
  role: sb.user.user_metadata?.role || "viewer",
  title: sb.user.user_metadata?.title || "",
  // Scope derived from GET /auth/me in Phase 5; empty until then.
  viewerManagerIds: [],
  activeManagerId: null,
  accessToken: sb.access_token,
});

const SessionProvider = ({ children }) => {
  const [session, setSession] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [needsPasswordReset, setNeedsPasswordReset] = React.useState(false);

  const hydrateSession = React.useCallback(async (sb) => {
    if (!sb) { setSession(null); return; }
    const base = mapSupabaseSession(sb);
    try {
      const res = await fetch(`${API_BASE_URL}/auth/me`, {
        headers: { Authorization: `Bearer ${sb.access_token}` },
      });
      if (res.ok) {
        const { user, scope } = await res.json();
        setSession({
          ...base,
          role:              user.role,
          name:              user.name || base.name,
          viewerManagerIds:  scope?.viewableManagerIds ?? [],
          activeManagerId:   (scope?.viewableManagerIds ?? [])[0] ?? null,
        });
        return;
      }
    } catch (err) {
      console.error('[session] /auth/me failed, falling back to JWT role:', err);
    }
    setSession(base);
  }, []);

  React.useEffect(() => {
    if (!supabaseClient) { setLoading(false); return; }
    supabaseClient.auth.getSession()
      .then(({ data: { session: sb } }) => hydrateSession(sb))
      .catch((err) => console.error("getSession failed:", err))
      .finally(() => setLoading(false));
    const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((event, sb) => {
      if (event === 'PASSWORD_RECOVERY') setNeedsPasswordReset(true);
      hydrateSession(sb);
    });
    return () => subscription.unsubscribe();
  }, [hydrateSession]);

  const login = async ({ email, password }) => {
    if (!supabaseClient) throw new Error("Supabase is not configured.");
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) throw error;
  };

  const logout = async () => {
    if (supabaseClient) await supabaseClient.auth.signOut();
    setSession(null);
  };

  const setViewerManager = (mid) => {
    setSession((cur) => cur ? { ...cur, activeManagerId: mid } : cur);
  };

  const refreshViewerSessionFromGroups = React.useCallback(async () => {
    const { data: { session: sb } } = await supabaseClient.auth.getSession();
    if (sb) await hydrateSession(sb);
  }, [hydrateSession]);

  if (loading) {
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: "var(--text-2)", fontSize: 14 }}>
        Loading…
      </div>
    );
  }

  return (
    <SessionContext.Provider value={{
      session,
      login,
      logout,
      setViewerManager,
      refreshViewerSessionFromGroups,
      activeManagerId: session?.role === "viewer" ? session.activeManagerId : null,
      needsPasswordReset,
      setNeedsPasswordReset,
    }}>
      {children}
    </SessionContext.Provider>
  );
};

</script>

// Flip true per domain as each API endpoint is verified in Phase 5.
const { useState, useEffect, useRef, useCallback } = React;

// ─── API CLIENT ───────────────────────────────────────────────────────────────

const apiFetch = async (path, token, { method = 'GET', body } = {}) => {
  const res = await fetch(`${API_BASE_URL}${path}`, {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
    },
    ...(body != null ? { body: JSON.stringify(body) } : {}),
  });
  if (res.status === 204) return null;
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error?.message || data?.message || `Request failed ${res.status}`);
  return data;
};

// ─── APP DATA CONTEXT ─────────────────────────────────────────────────────────
// Loads platform-wide data once on login and shares it across all admin screens.

const AppDataContext = React.createContext(null);
const useAppData = () => React.useContext(AppDataContext);

const AppDataProvider = ({ children }) => {
  const { session } = useSession();
  const token = session?.accessToken ?? null;
  const isAdmin = session?.role === 'admin';

  const [users,         setUsers]         = React.useState([]);
  const [groups,        setGroups]        = React.useState([]);
  const [managerGroups, setManagerGroups] = React.useState([]);
  const [participants,  setParticipants]  = React.useState([]);
  const [questions,     setQuestions]     = React.useState([]);
  const [schedules,     setSchedules]     = React.useState([]);
  const [dataLoading,   setDataLoading]   = React.useState(false);

  const loadAll = useCallback(async () => {
    if (!token) return;
    setDataLoading(true);
    try {
      const fetches = [
        apiFetch('/groups?limit=500', token),
        apiFetch('/participants?limit=500', token),
        apiFetch('/questions?limit=500', token),
        apiFetch('/schedules?limit=500', token),
      ];
      if (isAdmin) {
        fetches.push(
          apiFetch('/users?limit=500', token),
          apiFetch('/manager-groups', token),
        );
      }
      const [groupsRes, participantsRes, questionsRes, schedulesRes, usersRes, mgRes] = await Promise.all(fetches);
      setGroups(groupsRes?.data        || []);
      setParticipants(participantsRes?.data || []);
      setQuestions(questionsRes?.data   || []);
      setSchedules(schedulesRes?.data   || []);
      if (isAdmin) {
        setUsers(usersRes?.data         || []);
        setManagerGroups(mgRes?.data    || []);
      }
    } catch (err) {
      console.error('[AppData] load failed:', err);
    } finally {
      setDataLoading(false);
    }
  }, [token, isAdmin]);

  useEffect(() => { loadAll(); }, [loadAll]);

  return (
    <AppDataContext.Provider value={{
      users, groups, managerGroups, participants, questions, schedules,
      dataLoading, refresh: loadAll, token,
    }}>
      {children}
    </AppDataContext.Provider>
  );
};

// ─── LEGACY STUBS (unused after Phase 5 wiring) ───────────────────────────────

const loadGroups                  = () => [];

// Live monitor screen and log modal.
// Split from AI_Reporter inline bundle.

const Monitor = () => {
  const [activeId, setActiveId] = useState(2);
  const [simMessages, setSimMessages] = useState(CONVERSATIONS);
  const [inputVal, setInputVal] = useState("");
  const chatRef = useRef(null);

  const conv = simMessages[activeId] || { status: "pending", startedAt: "—", messages: [] };
  const emp = EMPLOYEES.find(e=>e.id===activeId) || { name: "Unknown", property: "Unknown", phone: "—", avatar: "?" };

  useEffect(()=>{
    if(chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  },[conv?.messages, activeId]);

  const sendReply = () => {
    if(!inputVal.trim()) return;
    const txt = inputVal.trim();
    setInputVal("");
    setSimMessages(prev => ({
      ...prev,
      [activeId]: {
        ...prev[activeId],
        status:"in-progress",
        messages:[...prev[activeId].messages, {role:"mgr",text:txt}]
      }
    }));
    // Simulate AI follow-up
    setTimeout(()=>{
      const nextQ = "Thank you! How many rooms are ready to rent right now?";
      setSimMessages(prev => ({
        ...prev,
        [activeId]: {
          ...prev[activeId],
          messages:[...prev[activeId].messages, {role:"ai",text:nextQ}]
        }
      }));
    },1200);
  };

  const isBelow55 = activeId===2;

  return (
    <div style={{flex:1,display:"flex",overflowX:"auto",overflowY:"auto"}}>
      {/* Employee list */}
      <div style={{width:"min(260px, 34vw)",borderRight:"1px solid var(--border)",overflowY:"auto",padding:"16px 12px",flexShrink:0}}>
        <div style={{fontSize:11,fontWeight:600,color:"var(--text-3)",letterSpacing:"0.05em",
          textTransform:"uppercase",padding:"0 8px",marginBottom:10}}>Active Broadcast</div>
        {EMPLOYEES.map(e=>{
          const c = simMessages[e.id] || { status: "pending", messages: [] };
          const isActive = e.id===activeId;
          return (
            <button type="button" key={e.id} onClick={()=>setActiveId(e.id)} style={{
              padding:"11px 12px",borderRadius:8,marginBottom:4,cursor:"pointer",
              background:isActive?"var(--primary-light)":"transparent",
              border:`1px solid ${isActive?"var(--primary)":"transparent"}`,
              transition:"all 0.15s", width:"100%", textAlign:"left"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                <Avatar initials={e.avatar} size={30}
                  color={c.status==="completed"?"green":c.status==="in-progress"?"amber":"primary"}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:500,fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.name}</div>
                  <div style={{fontSize:11,color:"var(--text-3)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.property}</div>
                </div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <StatusPill status={c.status}/>
                  {c.status==="pending" && (
                    <span style={{fontSize:10,fontWeight:700,color:"var(--red)",background:"var(--red-bg)",
                      borderRadius:99,padding:"2px 7px",textTransform:"uppercase",letterSpacing:"0.03em"}}>
                      Overdue
                    </span>
                  )}
                </div>
                {c.occupancy && <span style={{fontSize:11,fontWeight:600,
                  color:c.occupancy>=65?"var(--green)":c.occupancy>=55?"var(--amber)":"var(--red)"}}>
                  {c.occupancy}%
                </span>}
              </div>
              {c.startedAt && c.status !== "completed" && (
                <div style={{fontSize:10,color:"var(--text-3)",marginTop:4}}>Sent {c.startedAt}</div>
              )}
            </button>
          );
        })}
      </div>

      {/* Chat panel */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Header */}
        <div style={{padding:"16px 24px",borderBottom:"1px solid var(--border)",background:"var(--surface)",
          display:"flex",alignItems:"center",gap:14,flexShrink:0}}>
          <Avatar initials={emp.avatar} size={36}
            color={conv.status==="completed"?"green":conv.status==="in-progress"?"amber":"primary"}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:15}}>{emp.name}</div>
            <div style={{fontSize:12,color:"var(--text-3)"}}>{emp.property} · {emp.phone} · Started {conv.startedAt}</div>
          </div>
          <StatusPill status={conv.status}/>
        </div>

        {/* Awaiting response banner */}
        {conv.status==="pending" && (
          <div style={{background:"var(--red-bg)",borderBottom:"1px solid oklch(90% 0.04 22)",
            padding:"10px 24px",flexShrink:0,display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:"var(--red)",fontSize:13}}>●</span>
            <span style={{fontSize:13,fontWeight:600,color:"var(--red)"}}>Awaiting first response</span>
            <span style={{fontSize:12,color:"var(--text-3)",marginLeft:4}}>— SMS sent {conv.startedAt}, no reply yet</span>
          </div>
        )}

        {/* AI tasks banner for low occupancy */}
        {isBelow55 && (
          <div style={{background:"var(--amber-bg)",borderBottom:"1px solid oklch(88% 0.06 68)",
            padding:"12px 24px",flexShrink:0}}>
            <div style={{fontWeight:600,fontSize:13,color:"var(--amber)",marginBottom:6}}>
              ⚠ Occupancy below 55% — AI has assigned advertising tasks
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {AI_TASKS_JAMES.slice(0,3).map((t,i)=>(
                <div key={i} style={{fontSize:11,background:"#fff",border:"1px solid oklch(88% 0.06 68)",
                  borderRadius:6,padding:"3px 8px",color:"var(--text-2)"}}>{t.slice(0,52)}…</div>
              ))}
              <div style={{fontSize:11,color:"var(--amber)",padding:"3px 4px",fontWeight:500}}>
                +{AI_TASKS_JAMES.length-3} more
              </div>
            </div>
          </div>
        )}

        {/* Messages */}
        <div ref={chatRef} aria-live="polite" aria-relevant="additions text" style={{flex:1,overflowY:"auto",padding:"20px 24px",display:"flex",flexDirection:"column",gap:12}}>
          {conv.messages.map((m,i)=>{
            const isAI = m.role==="ai";
            return (
              <div key={i} style={{display:"flex",flexDirection:isAI?"row":"row-reverse",gap:10,alignItems:"flex-end"}}>
                {isAI && (
                  <div style={{width:26,height:26,borderRadius:"50%",background:"var(--primary)",
                    display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginBottom:2}}>
                    <span style={{color:"#fff",fontSize:11,fontWeight:700}}>A</span>
                  </div>
                )}
                <div style={{maxWidth:"70%"}}>
                  {isAI&&<div style={{fontSize:10,color:"var(--text-3)",marginBottom:3,fontWeight:500}}>AI Reporter</div>}
                  <div style={{
                    padding:"10px 14px",borderRadius:isAI?"4px 14px 14px 14px":"14px 4px 14px 14px",
                    background:isAI?"var(--surface)":"var(--primary)",
                    color:isAI?"var(--text)":"#fff",
                    border:isAI?"1px solid var(--border)":"none",
                    fontSize:14,lineHeight:1.5,
                    boxShadow:isAI?"var(--shadow)":"none",
                  }}>{m.text}</div>
                </div>
                {!isAI && (
                  <div style={{width:26,height:26,borderRadius:"50%",background:"var(--green)",
                    display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginBottom:2}}>
                    <span style={{color:"#fff",fontSize:10,fontWeight:700}}>{emp.avatar}</span>
                  </div>
                )}
              </div>
            );
          })}
          {conv.status==="completed" && (
            <div style={{textAlign:"center",padding:"16px 0"}}>
              <span style={{background:"var(--green-bg)",color:"var(--green)",fontSize:12,fontWeight:600,
                padding:"6px 14px",borderRadius:99}}>✓ Report Complete — All topics collected</span>
            </div>
          )}
        </div>

        {/* Input */}
        {conv.status!=="completed" && (
          <div style={{padding:"14px 24px",borderTop:"1px solid var(--border)",background:"var(--surface)",flexShrink:0}}>
            <div style={{fontSize:11,color:"var(--text-3)",marginBottom:8,fontWeight:500}}>
              Simulate manager reply (demo mode)
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={inputVal} onChange={e=>setInputVal(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&sendReply()}
                placeholder="Type a reply as the manager…"
                style={{flex:1,border:"1px solid var(--border)",borderRadius:8,padding:"9px 14px",
                  fontSize:14,background:"var(--bg)"}}/>
              <button onClick={sendReply} style={{background:"var(--primary)",color:"#fff",
                borderRadius:8,padding:"9px 18px",fontWeight:600,fontSize:14}}>
                Send
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Completed report sidebar — show for completed conv */}
      {conv.status==="completed" && (
        <div style={{width:"min(260px, 34vw)",borderLeft:"1px solid var(--border)",overflowY:"auto",padding:"16px",flexShrink:0,background:"var(--surface)"}}>
          <div style={{fontSize:11,fontWeight:600,color:"var(--text-3)",letterSpacing:"0.05em",
            textTransform:"uppercase",marginBottom:12}}>Report Summary</div>
          {(() => {
            const log = FULL_LOGS[activeId];
            if (!log || !log.analysis || log.analysis.length === 0) {
              return <div style={{fontSize:13,color:"var(--text-3)",lineHeight:1.5}}>No summary available for this report.</div>;
            }
            return (
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {log.analysis.map((item, i) => (
                  <div key={i} style={{paddingBottom:8,borderBottom:"1px solid var(--border)"}}>
                    <div style={{fontSize:11,color:"var(--text-3)",fontWeight:500,marginBottom:3,lineHeight:1.4}}>{item.q}</div>
                    <div style={{fontSize:13,fontWeight:600,color:item.flag==="red"?"var(--red)":item.flag==="amber"?"var(--amber)":"var(--text)",lineHeight:1.4}}>{item.a}</div>
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
};

/**
 * Roster rows inside one broadcast card.
 * Admin (full history): everyone for “today”; past weeks only people with a stored thread.
 * Participant / manager / viewer: only people who already have a thread — so new contacts do not appear under Weekly Ops until a report exists.
 */
const employeesForBroadcastRows = (b, visibleEmployees, historyScoped) => {
  if (!historyScoped) {
    return visibleEmployees.filter((e) => b.id === 1 || CONVERSATIONS[e.id] != null);
  }
  return visibleEmployees.filter((e) => CONVERSATIONS[e.id] != null);
};

const History = ({ managerFilterId, title, subtitle, participantEmployeeId, defaultExpandedBroadcastId }) => {
  const [expanded, setExpanded] = useState(null);
  const [logModal, setLogModal] = useState(null); // {empId, log}

  const visibleEmployees = React.useMemo(
    () =>
      EMPLOYEES.filter((e) => {
        if (participantEmployeeId != null) return e.id === participantEmployeeId;
        if (managerFilterId == null) return true;
        return employeeInManagerRoster(e.id, managerFilterId);
      }),
    [participantEmployeeId, managerFilterId]
  );

  const historyScoped = participantEmployeeId != null || managerFilterId != null;

  const broadcastsShown = React.useMemo(() => {
    if (!historyScoped) return BROADCASTS;
    return BROADCASTS.filter((b) => employeesForBroadcastRows(b, visibleEmployees, true).length > 0);
  }, [historyScoped, visibleEmployees, participantEmployeeId, managerFilterId]);

  React.useEffect(() => {
    if (!broadcastsShown.length) {
      setExpanded(null);
      return;
    }
    setExpanded((cur) => {
      if (cur != null && broadcastsShown.some((b) => b.id === cur)) return cur;
      if (defaultExpandedBroadcastId != null && broadcastsShown.some((b) => b.id === defaultExpandedBroadcastId))
        return defaultExpandedBroadcastId;
      if (participantEmployeeId != null) return broadcastsShown[0].id;
      return null;
    });
  }, [participantEmployeeId, managerFilterId, defaultExpandedBroadcastId, broadcastsShown]);

  return (
    <div style={{flex:1,overflowY:"auto",padding:"32px 36px"}}>
      <div style={{marginBottom:28}}>
        <h1 style={{fontSize:22,fontWeight:700}}>{title || "Report History"}</h1>
        <p style={{color:"var(--text-2)",marginTop:3}}>
          {subtitle || "Full conversation logs stored for tracking and auditing."}
        </p>
      </div>

      {broadcastsShown.length === 0 && (
        <div
          style={{
            background: "var(--surface)",
            border: "1px solid var(--border)",
            borderRadius: "var(--radius)",
            padding: "22px 24px",
            color: "var(--text-2)",
            fontSize: 14,
            boxShadow: "var(--shadow)",
          }}
        >
          {historyScoped
            ? participantEmployeeId != null
              ? "No correspondences yet. Your weekly reports will appear here after the first one has started."
              : "No correspondences yet. Next step: in Admin, assign users/contacts to groups and link those groups to a manager."
            : "No broadcasts to show."}
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {broadcastsShown.map((b) => (
          <div key={b.id} style={{background:"var(--surface)",border:"1px solid var(--border)",
            borderRadius:"var(--radius)",overflow:"hidden",boxShadow:"var(--shadow)"}}>
            <button
              type="button"
              onClick={()=>setExpanded(expanded===b.id?null:b.id)}
              aria-expanded={expanded===b.id}
              style={{display:"flex",alignItems:"center",gap:16,padding:"18px 22px",cursor:"pointer",width:"100%",textAlign:"left"}}
            >
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:15}}>{b.label}</div>
                <div style={{fontSize:13,color:"var(--text-3)",marginTop:2}}>{b.date}</div>
              </div>
              <div style={{display:"flex",gap:12,fontSize:13}}>

                {b.pending>0&&<span style={{color:"var(--text-3)"}}>{b.pending} pending</span>}
              </div>
              <span style={{color:"var(--text-3)",fontSize:18}}>{expanded===b.id?"∧":"∨"}</span>

            {expanded===b.id&&(
              <div style={{borderTop:"1px solid var(--border)",padding:"16px 22px"}}>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>

                            if (!c) return;

                            setLogModal({empId:e.id, log});
                          }}

                            padding:"5px 14px",
                            borderRadius:6,
                            border:`1px solid ${c ? "var(--primary)" : "var(--border)"}`,

        ))}

      {logModal&&(
        <LogModal log={logModal.log} empId={logModal.empId} onClose={()=>setLogModal(null)}/>

  );

// ── Modal shell ──
const Modal = ({title, onClose, children, width=480}) => {
  const dialogRef = useRef(null);
  const restoreFocusRef = useRef(null);
  const titleIdRef = useRef(`modal-title-${Math.random().toString(36).slice(2, 9)}`);
  const onCloseRef = useRef(onClose);
  useEffect(() => { onCloseRef.current = onClose; });

  useEffect(() => {
    restoreFocusRef.current = document.activeElement instanceof HTMLElement ? document.activeElement : null;
    const prevOverflow = document.body.style.overflow;
    document.body.style.overflow = "hidden";

    const focusableSelector =
      'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';

    window.requestAnimationFrame(() => {
      const firstFocusable = dialogRef.current?.querySelector(focusableSelector);
      if (firstFocusable instanceof HTMLElement) firstFocusable.focus();
      else dialogRef.current?.focus();
    });

    const onKeyDown = (e) => {
      if (!dialogRef.current) return;
      if (e.key === "Escape") {
        e.preventDefault();
        onCloseRef.current();
        return;
      }
      if (e.key !== "Tab") return;

      const focusables = [...dialogRef.current.querySelectorAll(focusableSelector)].filter(
        (el) => !el.hasAttribute("disabled")
      );
      if (!focusables.length) {
        e.preventDefault();
        dialogRef.current.focus();
        return;
      }
      const first = focusables[0];
      const last = focusables[focusables.length - 1];
      const active = document.activeElement;
      if (e.shiftKey && active === first) {
        e.preventDefault();
        last.focus();
      } else if (!e.shiftKey && active === last) {
        e.preventDefault();
        first.focus();
      }
    };

    window.addEventListener("keydown", onKeyDown);
    return () => {
      window.removeEventListener("keydown", onKeyDown);
      document.body.style.overflow = prevOverflow;
      if (restoreFocusRef.current && typeof restoreFocusRef.current.focus === "function") {
        restoreFocusRef.current.focus();
      }
    };
  }, []);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(42, 50, 82, 0.26)",backdropFilter:"blur(2px)",zIndex:2000,
      display:"flex",alignItems:"center",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div
        ref={dialogRef}
        role="dialog"
        aria-modal="true"
        aria-labelledby={titleIdRef.current}
        tabIndex={-1}
        style={{width,background:"var(--surface)",borderRadius:"var(--radius)",boxShadow:"var(--shadow-strong)",
        border:"1px solid var(--border)",padding:"24px",maxHeight:"90vh",overflowY:"auto"}}
      >
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div id={titleIdRef.current} style={{fontWeight:700,fontSize:16}}>{title}</div>
          <button type="button" onClick={onClose} aria-label="Close dialog" style={{fontSize:14,fontWeight:600,color:"var(--text-2)",lineHeight:1,padding:"6px 10px",border:"1px solid var(--border)",borderRadius:8}}>Close</button>
        </div>
        {children}
      </div>
    </div>
  );
};

};

const QuestionsTab = () => {
  const { questions, token, refresh } = useAppData();
  const [modal,     setModal]     = useState(null); // null | {mode:"add"} | {mode:"edit", q}
  const [draft,     setDraft]     = useState({ text: "" });
  const [deleteId,  setDeleteId]  = useState(null);
  const [formError, setFormError] = useState("");
  const [saving,    setSaving]    = useState(false);

  const openAdd  = () => { setDraft({ text: "" }); setFormError(""); setModal({ mode: "add" }); };
  const openEdit = q  => { setDraft({ text: q.text }); setFormError(""); setModal({ mode: "edit", q }); };

  const save = async () => {
    if (!draft.text.trim()) { setFormError("Question text is required."); return; }
    setFormError("");
    setSaving(true);
    try {
      if (modal.mode === "add") {
        await apiFetch("/questions", token, { method: "POST", body: { text: draft.text.trim() } });
        toastSuccess("Question added.");
      } else {
        await apiFetch(`/questions/${modal.q.id}`, token, { method: "PATCH", body: { text: draft.text.trim() } });
        toastSuccess("Question updated.");
      }
      await refresh();
      setModal(null);
    } catch (err) {
      toastError(`Could not save question: ${err.message}`);
    } finally {
      setSaving(false);
    }
  };

  const remove = async () => {
    setSaving(true);
    try {
      await apiFetch(`/questions/${deleteId}`, token, { method: "DELETE" });
      await refresh();
      setDeleteId(null);
      toastSuccess("Question deleted.");
    } catch (err) {
      toastError(`Could not delete question: ${err.message}`);
    } finally {
      setSaving(false);
    }
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:13,color:"var(--text-3)"}}>
          {questions.length} question{questions.length !== 1 ? "s" : ""} · AI asks them in sequence

        <Modal title={modal.mode === "add" ? "Add Question" : "Edit Question"} onClose={() => setModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div>
              <div style={{fontSize:13,fontWeight:500,marginBottom:6}}>Question text</div>
              <textarea value={draft.text} onChange={e => setDraft(d => ({ ...d, text: e.target.value }))}
                rows={3} placeholder="What would you like to ask the manager?"
                style={{...inputSx, resize:"vertical"}} />
            </div>
            {formError && <div style={{fontSize:12,color:"var(--red)"}}>{formError}</div>}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>
              <button onClick={() => setModal(null)} style={{border:"1px solid var(--border)",
                borderRadius:8,padding:"9px 18px",fontSize:14,fontWeight:500}}>Cancel</button>
              <button type="button" onClick={save} disabled={saving || !draft.text.trim()}
                style={{background:"var(--primary)",color:"#fff",borderRadius:8,padding:"9px 18px",
                  fontSize:14,fontWeight:600,opacity:saving||!draft.text.trim()?0.6:1}}>
                {saving ? "Saving…" : modal.mode === "add" ? "Add Question" : "Save Changes"}
              </button>
            </div>
          </div>
        </Modal>
      )}

      {/* Delete confirm */}
      {deleteId && (
        <Modal title="Delete question?" onClose={() => setDeleteId(null)} width={380}>
          <div style={{fontSize:14,color:"var(--text-2)",marginBottom:20}}>
            This question will be permanently removed.
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={() => setDeleteId(null)} style={{border:"1px solid var(--border)",
              borderRadius:8,padding:"9px 18px",fontSize:14,fontWeight:500}}>Cancel</button>
            <button onClick={remove} disabled={saving}
              style={{background:"var(--red)",color:"#fff",borderRadius:8,padding:"9px 18px",
                fontSize:14,fontWeight:600,opacity:saving?0.6:1}}>
              {saving ? "Deleting…" : "Delete"}
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
};

          {sched.days.length===0&&<div style={{fontSize:12,color:"var(--red)",marginTop:8}}>Select at least one day</div>}

          padding:"18px 20px",boxShadow:"var(--shadow)"}}>

              <option value="America/Los_Angeles">Pacific (PT)</option>
            </select>
          </div>
          <div style={{marginTop:10,fontSize:12,color:"var(--text-3)"}}>
            Next send: {sched.days.length>0 ? `${sched.days[0]} at ${sched.time} ${sched.timezone==="America/Chicago"?"CT":sched.timezone==="America/New_York"?"ET":sched.timezone==="America/Denver"?"MT":"PT"}` : "—"}
          </div>
        </div>

        {/* Template */}
        <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius)",
          padding:"18px 20px",boxShadow:"var(--shadow)"}}>
          <div style={{fontWeight:600,fontSize:14,marginBottom:14}}>Report template</div>
          {["Weekly Operations Report","Incident Report"].map(t=>(
            <button type="button" key={t} onClick={()=>setSched(s=>({...s,template:t}))} style={{

// ── Employees tab ──
const EmployeesTab = () => {
  const [employees, setEmployees] = useState(initEmployees);
  const [modal, setModal] = useState(null);
  const [draft, setDraft] = useState({name:"",property:"",phone:"",active:true});
  const [deleteId, setDeleteId] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const nextEmpId = useRef(employees.length+1);

  const initials = name => name.trim().split(" ").filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("") || "?";

  const openAdd = () => { setDraft({name:"",property:"",phone:"",active:true}); setSubmitted(false); setModal({mode:"add"}); };
  const openEdit = e => { setDraft({name:e.name,property:e.property,phone:e.phone,active:e.active}); setSubmitted(false); setModal({mode:"edit",e}); };

  const save = () => {
    setSubmitted(true);
    if(!draft.name.trim()||!draft.phone.trim()) return;
    if(modal.mode==="add"){
      setEmployees(prev=>[...prev,{id:nextEmpId.current++,...draft,avatar:initials(draft.name)}]);
    } else {
      setEmployees(prev=>prev.map(e=>e.id===modal.e.id?{...e,...draft,avatar:initials(draft.name)}:e));
    }
    setModal(null);
  };

  const toggleActive = id => setEmployees(prev=>prev.map(e=>e.id===id?{...e,active:!e.active}:e));
  const remove = id => { setEmployees(prev=>prev.filter(e=>e.id!==id)); setDeleteId(null); };

  const active = employees.filter(e=>e.active);
  const inactive = employees.filter(e=>!e.active);
  const canSaveEmployee = draft.name.trim() && draft.phone.trim();

  const EmpRow = ({e}) => (
    <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8,
      padding:"12px 16px",display:"flex",alignItems:"center",gap:14,boxShadow:"var(--shadow)"}}>
      <Avatar initials={e.avatar||initials(e.name)} size={36} color={e.active?"primary":"primary"}/>
      <div style={{flex:1}}>
        <div style={{fontWeight:500,fontSize:14,display:"flex",alignItems:"center",gap:8}}>
          {e.name}
          {!e.active && (
            <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.03em",borderRadius:99,padding:"2px 7px",background:"var(--border)",color:"var(--text-3)"}}>
              Inactive
            </span>
          )}
        </div>
        <div style={{fontSize:12,color:"var(--text-3)"}}>{e.property} · {e.phone}</div>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <button onClick={()=>toggleActive(e.id)} style={{fontSize:12,
          color:e.active?"var(--text-2)":"var(--green)",fontWeight:500,
          border:"1px solid var(--border)",borderRadius:6,padding:"4px 10px"}}>
          {e.active?"Deactivate":"Activate"}
        </button>
        <button onClick={()=>openEdit(e)} style={{fontSize:12,color:"var(--text-3)",
          border:"1px solid var(--border)",borderRadius:6,padding:"4px 10px",fontWeight:500}}>Edit</button>
        <button onClick={()=>setDeleteId(e.id)} style={{fontSize:12,color:"var(--red)",
          border:"1px solid var(--red-bg)",borderRadius:6,padding:"4px 10px",fontWeight:500}}>Remove</button>
      </div>
    </div>

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:13,color:"var(--text-3)"}}>
          {active.length} active · {inactive.length} inactive

          borderRadius:8,padding:"8px 16px",fontWeight:600,fontSize:13}}>
          + Add Employee
        </button>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
        {active.map(e=><EmpRow key={e.id} e={e}/>)}
      </div>

      {inactive.length>0&&(
        <>
          <div style={{fontSize:11,fontWeight:600,color:"var(--text-3)",letterSpacing:"0.05em",
            textTransform:"uppercase",marginBottom:10}}>Inactive</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {inactive.map(e=><EmpRow key={e.id} e={e}/>)}
          </div>
        </>
      )}

      {/* Add/Edit modal */}
      {modal&&(
        <Modal title={modal.mode==="add"?"Add Employee":"Edit Employee"} onClose={()=>setModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {[
              {label:"Full name",    key:"name",    placeholder:"e.g. Maria Santos"},
              {label:"Property",     key:"property",placeholder:"e.g. Sunset Inn"},
              {label:"Cell phone",   key:"phone",   placeholder:"e.g. (555) 201-4411"},
            ].map(f=>(
              <div key={f.key}>
                <div style={{fontSize:13,fontWeight:500,marginBottom:6}}>{f.label}</div>
                <input aria-label={f.label} value={draft[f.key]} onChange={e=>setDraft(d=>({...d,[f.key]:e.target.value}))}
                  placeholder={f.placeholder} style={inputSx}/>
              </div>
            ))}
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button
                type="button"
                role="switch"
                aria-label="Toggle employee active state"
                aria-checked={draft.active}
                onClick={()=>setDraft(d=>({...d,active:!d.active}))}
                style={{width:44,height:24,borderRadius:99,background:draft.active?"var(--green)":"var(--border)",
                  position:"relative",cursor:"pointer",transition:"background 0.2s",flexShrink:0}}
              >
                <div style={{position:"absolute",top:3,left:draft.active?22:3,width:18,height:18,
                  borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
              </button>
              <span style={{fontSize:14}}>{draft.active?"Active — will receive broadcasts":"Inactive — excluded from broadcasts"}</span>
            </div>
            {submitted && (!draft.name.trim()||!draft.phone.trim())&&(
              <div style={{fontSize:12,color:"var(--red)"}}>
                {!draft.name.trim() ? "Name is required." : "Phone is required."}
              </div>
            )}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>
              <button onClick={()=>setModal(null)} style={{border:"1px solid var(--border)",
                borderRadius:8,padding:"9px 18px",fontSize:14,fontWeight:500}}>Cancel</button>
              <button
                type="button"
                onClick={save}
                style={{background:"var(--primary)",color:"#fff",
                borderRadius:8,padding:"9px 18px",fontSize:14,fontWeight:600,cursor:"pointer"}}
              >
                {modal.mode==="add"?"Add Employee":"Save Changes"}
              </button>
            </div>
          </div>
        </Modal>
      )}

      {deleteId&&(
        <Modal title="Remove employee?" onClose={()=>setDeleteId(null)} width={380}>
          <div style={{fontSize:14,color:"var(--text-2)",marginBottom:20}}>
            This employee will be removed and will no longer receive broadcasts.
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setDeleteId(null)} style={{border:"1px solid var(--border)",
              borderRadius:8,padding:"9px 18px",fontSize:14,fontWeight:500}}>Cancel</button>
            <button onClick={()=>remove(deleteId)} style={{background:"var(--red)",color:"#fff",
              borderRadius:8,padding:"9px 18px",fontSize:14,fontWeight:600}}>Remove</button>
          </div>
        </Modal>
      )}
    </div>
  );
};

const AdminSearchableGroupPickModal = ({ title, initialSelected, onClose, onSave }) => {

const AdminUsersTab = () => {
  const { users, groups, token, refresh } = useAppData();
  const [rowQuery, setRowQuery] = useState("");
  const [draft, setDraft] = useState({ name: "", email: "", phone: "", role: "viewer" });
  const [sortBy, setSortBy] = useState("name-asc");
  const [filterRole, setFilterRole] = useState("all");
  const [filterGroupName, setFilterGroupName] = useState("");
  const [density, setDensity] = useState("comfortable");
  const [edit, setEdit] = useState(null);
  const [groupPickUserId, setGroupPickUserId] = useState(null);
  const [viewGroupsUserId, setViewGroupsUserId] = useState(null);
  const [selectedUserIds, setSelectedUserIds] = useState(() => new Set());
  const [bulkGroupModalOpen, setBulkGroupModalOpen] = useState(false);
  const [pendingRemoveUserId, setPendingRemoveUserId] = useState(null);
  const [saving, setSaving] = useState(false);

  const groupNameById = React.useMemo(() => {
    const map = {};
    groups.forEach(g => { map[g.id] = g.name; });
    return map;
  }, [groups]);

  const groupsForUserId = (userId) =>
    groups.filter(g => (g.memberIds || []).includes(userId)).map(g => g.id);

  const groupNamesForUser = (userId) =>
    groupsForUserId(userId).map(gid => groupNameById[gid] || `Group ${gid}`);

  const groupSortKeyForUser = (userId) => {
    const names = groupNamesForUser(userId).map(n => String(n).toLowerCase()).sort();
    if (!names.length) return "~~~";
    return names.join(" | ");
  };

  const addUser = async () => {
    if (!draft.name.trim()) { toastError("Could not add user: name is required."); return; }
    if (draft.role !== "participant" && !draft.email.trim()) { toastError("Could not add user: email is required."); return; }
    if (draft.role === "participant" && !draft.phone.trim()) { toastError("Could not add user: phone is required for participants."); return; }
    setSaving(true);
    try {
      const body = { name: draft.name.trim(), role: draft.role };
      if (draft.email.trim()) body.email = draft.email.trim();
      if (draft.phone.trim()) body.phone = draft.phone.trim();
      await apiFetch("/users", token, { method: "POST", body });
      setDraft({ name: "", email: "", phone: "", role: "viewer" });
      await refresh();
      toastSuccess(`User added: ${draft.name.trim()}.`);
    } catch (err) {
      toastError(`Could not add user: ${err.message}`);
    } finally {
      setSaving(false);
    }
  };

  const remove = async (id) => {
    const removed = users.find(r => r.id === id);
    setSaving(true);
    try {
      await apiFetch(`/users/${id}`, token, { method: "DELETE" });
      setSelectedUserIds(prev => { const n = new Set(prev); n.delete(id); return n; });
      await refresh();
      toastSuccess(`User removed${removed ? `: ${removed.name}` : ""}.`);
    } catch (err) {
      toastError(`Could not remove user: ${err.message}`);
    } finally {
      setSaving(false);
      setPendingRemoveUserId(null);
    }
  };

  const saveEdit = async () => {
    if (!edit) return;
    if (!edit.name?.trim()) { toastError("Could not save user: name is required."); return; }
    setSaving(true);
    try {
      const body = { name: edit.name.trim(), role: edit.role };
      if (edit.email?.trim()) body.email = edit.email.trim();
      if ((edit.phone || "").trim()) body.phone = edit.phone.trim();
      await apiFetch(`/users/${edit.id}`, token, { method: "PATCH", body });
      setEdit(null);
      await refresh();
      toastSuccess("User changes saved.");
    } catch (err) {
      toastError(`Could not save user: ${err.message}`);
    } finally {
      setSaving(false);
    }
  };

  const setUserGroupMembershipsAPI = async (userId, newGroupIds) => {
    const currentGroupIds = groupsForUserId(userId);
    const newSet = new Set(newGroupIds);
    const currentSet = new Set(currentGroupIds);
    const toAdd = newGroupIds.filter(gid => !currentSet.has(gid));
    const toRemove = currentGroupIds.filter(gid => !newSet.has(gid));
    await Promise.all([
      ...toAdd.map(gid => apiFetch(`/groups/${gid}/members`, token, { method: "POST", body: { userId } })),
      ...toRemove.map(gid => apiFetch(`/groups/${gid}/members/${userId}`, token, { method: "DELETE" })),
    ]);
  };

  const isUserEditDirty = (e) => {
    if (!e || !e.__baseline) return false;
    const cur = { name: String(e.name || "").trim(), email: String(e.email || "").trim(), phone: String(e.phone || "").trim(), role: e.role };
    const base = e.__baseline;
    return cur.name !== base.name || cur.email !== base.email || cur.phone !== base.phone || cur.role !== base.role;
  };

  const requestCloseUserEdit = () => {
    if (edit && isUserEditDirty(edit) && !confirmDiscardUnsaved("user editor")) return;
    setEdit(null);
  };

  const filteredRows = users.filter(r => {
    const q = rowQuery.trim().toLowerCase();
    const groupsText = groupNamesForUser(r.id).join(" ").toLowerCase();
    const baseMatch = !q || (r.name || "").toLowerCase().includes(q) || (r.email || "").toLowerCase().includes(q) || String(r.role || "").toLowerCase().includes(q) || groupsText.includes(q);
    if (!baseMatch) return false;
    if (filterRole !== "all" && r.role !== filterRole) return false;
    if (filterGroupName.trim() && !groupsText.includes(filterGroupName.trim().toLowerCase())) return false;
    return true;
  });

  const sortedRows = [...filteredRows].sort((a, b) => {
    if (sortBy === "name-asc") return String(a.name || "").localeCompare(String(b.name || ""));
    if (sortBy === "name-desc") return String(b.name || "").localeCompare(String(a.name || ""));
    if (sortBy === "role") return String(a.role || "").localeCompare(String(b.role || ""));
    if (sortBy === "groups-desc") return groupsForUserId(b.id).length - groupsForUserId(a.id).length;
    if (sortBy === "groups-name") {
      const aKey = groupSortKeyForUser(a.id);
      const bKey = groupSortKeyForUser(b.id);
      if (aKey === bKey) return String(a.name || "").localeCompare(String(b.name || ""));
      return aKey.localeCompare(bKey);
    }
    return 0;
  });
  const visibleUserIds = new Set(sortedRows.map(r => r.id));
  const selectedVisibleUserIds = [...selectedUserIds].filter(uid => visibleUserIds.has(uid));
  const hiddenSelectedUserIds = [...selectedUserIds].filter(uid => !visibleUserIds.has(uid));

  const toggleSelectedUser = (uid) => {
    setSelectedUserIds(prev => { const n = new Set(prev); if (n.has(uid)) n.delete(uid); else n.add(uid); return n; });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-3)", marginBottom: 4 }}>Email</div>
            <input aria-label="User email" placeholder="Email" value={draft.email} onChange={(e) => setDraft((d) => ({ ...d, email: e.target.value }))} style={inputSx} />
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-3)", marginBottom: 4 }}>Phone (E.164)</div>
            <input aria-label="User phone number" placeholder="+1…" value={draft.phone} onChange={(e) => setDraft((d) => ({ ...d, phone: e.target.value }))} style={inputSx} />
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-3)", marginBottom: 4 }}>Role</div>
            <select aria-label="User role" value={draft.role} onChange={(e) => setDraft((d) => ({ ...d, role: e.target.value }))} style={inputSx}>
              <option value="admin">admin</option>
              <option value="manager">manager</option>
              <option value="viewer">viewer</option>
              <option value="participant">participant</option>
            </select>
          </div>
          <div style={{ fontSize: 13, color: "var(--text-2)", padding: "8px 0", alignSelf: "center", gridColumn: "1 / -1" }}>
            {draft.role === "participant"
              ? "Participants receive SMS prompts — phone is required, no platform login. Assign them to a group after creating."
              : draft.role === "viewer"
              ? "Viewer access is determined by group membership — add the user to groups after creating them."
              : "An invite email will be sent so the user can set their own password."}
          </div>
        </div>
        <button type="button" onClick={addUser} disabled={saving} style={{ marginTop: 12, ...primaryBtn, opacity: saving ? 0.6 : 1 }}>
          Add user
        </button>
      </div>

      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
        <input aria-label="Search users by name email role or group" placeholder="Search users by name/email/role/group…" value={rowQuery} onChange={(e) => setRowQuery(e.target.value)} style={{ ...inputSx, maxWidth: 320 }} />
        <select aria-label="Filter users by role" value={filterRole} onChange={(e) => setFilterRole(e.target.value)} style={{ ...inputSx, width: 140 }}>

        <input aria-label="Filter users by group name" placeholder="Filter group name…" value={filterGroupName} onChange={(e) => setFilterGroupName(e.target.value)} style={{ ...inputSx, width: 180 }} />
        <select aria-label="Sort users table" value={sortBy} onChange={(e) => setSortBy(e.target.value)} style={{ ...inputSx, width: 200 }}>
          <option value="name-asc">Sort: Name A-Z</option>

const AdminGroupsTab = () => {
  const { users, groups, token, refresh: refreshData } = useAppData();
  const [modal, setModal] = useState(null);
  const [editingMemberIds, setEditingMemberIds] = useState(() => new Set());
  const [saving, setSaving] = useState(false);

  const openCreate = () => {
    setModal({ name: "", description: "", __baseline: { name: "", description: "" } });
    setEditingMemberIds(new Set());
  };

  const openEdit = (g) => {
    setModal({ id: g.id, name: g.name, description: g.description || "", __baseline: { name: String(g.name || ""), description: String(g.description || "") } });
    setEditingMemberIds(new Set(g.memberIds || []));
  };

  const saveModal = async () => {
    if (!modal || !modal.name.trim()) { toastError("Could not save group: name is required."); return; }
    setSaving(true);
    try {
      if (modal.id == null) {
        await apiFetch("/groups", token, { method: "POST", body: { name: modal.name.trim(), description: modal.description?.trim() || undefined } });
        toastSuccess("Group created.");
      } else {
        await apiFetch(`/groups/${modal.id}`, token, { method: "PATCH", body: { name: modal.name.trim(), description: modal.description?.trim() || undefined } });
        const currentGroup = groups.find(g => g.id === modal.id);
        const currentIds = new Set(currentGroup?.memberIds || []);
        const toAdd = [...editingMemberIds].filter(uid => !currentIds.has(uid));
        const toRemove = [...currentIds].filter(uid => !editingMemberIds.has(uid));
        await Promise.all([
          ...toAdd.map(uid => apiFetch(`/groups/${modal.id}/members`, token, { method: "POST", body: { userId: uid } })),
          ...toRemove.map(uid => apiFetch(`/groups/${modal.id}/members/${uid}`, token, { method: "DELETE" })),
        ]);
        toastSuccess("Group changes saved.");
      }
      setModal(null);
      await refreshData();
    } catch (err) {
      toastError(`Could not save group: ${err.message}`);
    } finally {
      setSaving(false);
    }
  };

  const deleteGroup = async (id) => {
    if (!confirm("Delete this group? This will remove all member and manager links.")) return;
    const target = groups.find(g => g.id === id);
    setSaving(true);
    try {
      await apiFetch(`/groups/${id}`, token, { method: "DELETE" });
      await refreshData();
      toastSuccess(`Group deleted${target ? `: ${target.name}` : ""}.`);
    } catch (err) {
      toastError(`Could not delete group: ${err.message}`);
    } finally {
      setSaving(false);
    }
  };

  const toggleMember = (userId) => {
    setEditingMemberIds(prev => { const n = new Set(prev); if (n.has(userId)) n.delete(userId); else n.add(userId); return n; });
  };

  const editingId = modal && modal.id != null ? modal.id : null;
  const platformUsers = users;

  const isGroupModalDirty = (m) => {
    if (!m || !m.__baseline) return false;
    return String(m.name || "").trim() !== String(m.__baseline.name || "").trim() || String(m.description || "").trim() !== String(m.__baseline.description || "").trim();
  };
  const requestCloseGroupModal = () => {
    if (modal && isGroupModalDirty(modal) && !confirmDiscardUnsaved("group editor")) return;
    setModal(null);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <button type="button" onClick={openCreate} style={{ ...primaryBtn, width: "fit-content" }}>
        Create group
      </button>
      <div style={{ fontSize: 12, color: "var(--text-2)" }}>
        What this affects: group membership controls who appears in manager rosters and viewer manager context.
      </div>
      <div style={{ border: "1px solid var(--border)", borderRadius: 10, overflow: "hidden" }}>
        {groups.map((g) => (
          <div key={g.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", borderBottom: "1px solid var(--border)" }}>
            <div>
              <div style={{ fontWeight: 600 }}>{g.name}</div>
              {g.description && <div style={{ fontSize: 12, color: "var(--text-3)" }}>{g.description}</div>}
              <div style={{ fontSize: 12, color: "var(--text-3)" }}>{(g.memberIds || []).length} member{(g.memberIds || []).length !== 1 ? "s" : ""}</div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button type="button" onClick={() => openEdit(g)} style={{ fontSize: 13, fontWeight: 600, color: "var(--primary)" }}>Edit</button>
              <button type="button" onClick={() => deleteGroup(g.id)} disabled={saving} style={{ fontSize: 13, fontWeight: 600, color: "var(--red)" }}>Delete</button>
            </div>
          </div>
        ))}
        {groups.length === 0 && <div style={{ padding: 16, color: "var(--text-3)", fontSize: 13 }}>No groups yet. Create one to get started.</div>}
      </div>

      {modal && (
        <Modal title={modal.id == null ? "Create group" : "Edit group"} onClose={requestCloseGroupModal} width={520}>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 4 }}>Name</div>
              <input value={modal.name} onChange={(e) => setModal((x) => ({ ...x, name: e.target.value }))} style={inputSx} />
            </div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 4 }}>Description (optional)</div>
              <input value={modal.description || ""} onChange={(e) => setModal((x) => ({ ...x, description: e.target.value }))} style={inputSx} />
            </div>
            {editingId != null && platformUsers.length > 0 && (
              <>
                <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text-3)", marginTop: 4 }}>Platform users</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 200, overflowY: "auto" }}>
                  {platformUsers.map((u) => (
                    <label key={u.id} style={{ fontSize: 14, display: "flex", alignItems: "center", gap: 8 }}>
                      <input type="checkbox" checked={editingMemberIds.has(u.id)} onChange={() => toggleMember(u.id)} />
                      {u.name} ({u.role})
                    </label>
                  ))}
                </div>
              </>
            )}
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 8 }}>
              <button type="button" onClick={requestCloseGroupModal} style={{ border: "1px solid var(--border)", borderRadius: 8, padding: "8px 16px" }}>
                Cancel
              </button>
              <button type="button" onClick={saveModal} disabled={saving} style={{ ...primaryBtn, opacity: saving ? 0.6 : 1 }}>
                {modal.id == null ? "Create" : "Save"}
              </button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

const AdminManagerGroupsTab = () => {
  const { users, groups, managerGroups, token, refresh: refreshData } = useAppData();
  const managers = users.filter(u => u.role === "manager");
  const [mgrQuery, setMgrQuery] = useState("");
  const [mgrSort, setMgrSort] = useState("name-asc");
  const [selectedManagerId, setSelectedManagerId] = useState(null);
  const [groupModalOpen, setGroupModalOpen] = useState(false);
  const [saving, setSaving] = useState(false);

  React.useEffect(() => {
    if (!selectedManagerId && managers.length > 0) setSelectedManagerId(managers[0].id);
  }, [managers]);

  const filteredMgr = managers.filter((m) => {
    if (!mgrQuery.trim()) return true;
    const q = mgrQuery.trim().toLowerCase();
    return (m.name || "").toLowerCase().includes(q) || String(m.email || "").toLowerCase().includes(q);
  });

  const sortedMgr = [...filteredMgr].sort((a, b) => {
    if (mgrSort === "name-asc") return String(a.name || "").localeCompare(String(b.name || ""));
    if (mgrSort === "name-desc") return String(b.name || "").localeCompare(String(a.name || ""));
    return 0;
  });

  const sel = managers.find((m) => m.id === selectedManagerId);
  const assignedIds = sel ? managerGroups.filter((l) => l.managerId === sel.id).map((l) => l.groupId) : [];

  const groupNameById = React.useMemo(() => {
    const map = {};
    groups.forEach(g => { map[g.id] = g.name; });
    return map;
  }, [groups]);

  const applyManagerGroups = async (groupIds) => {
    if (!sel) { toastError("Select a manager first."); return; }
    setSaving(true);
    try {
      const newSet = new Set(groupIds);
      const currentSet = new Set(assignedIds);
      const toAdd = groupIds.filter(gid => !currentSet.has(gid));
      const toRemove = assignedIds.filter(gid => !newSet.has(gid));
      await Promise.all([
        ...toAdd.map(gid => apiFetch(`/groups/${gid}/managers`, token, { method: "POST", body: { managerId: sel.id } })),
        ...toRemove.map(gid => apiFetch(`/groups/${gid}/managers/${sel.id}`, token, { method: "DELETE" })),
      ]);
      setGroupModalOpen(false);
      await refreshData();
      toastSuccess("Manager group assignment saved.");
    } catch (err) {
      toastError(`Could not save assignment: ${err.message}`);
    } finally {
      setSaving(false);
    }
  };

  return (
    <div style={{ display: "flex", gap: 24, flexWrap: "wrap", alignItems: "flex-start", maxWidth: 960 }}>
      <div style={{ flex: "0 0 280px", minWidth: 220 }}>
        <div style={{ fontWeight: 700, marginBottom: 8, fontSize: 14 }}>Managers</div>
        <input placeholder="Search managers…" value={mgrQuery} onChange={(e) => setMgrQuery(e.target.value)} style={{ ...inputSx, marginBottom: 8 }} />
        <select value={mgrSort} onChange={(e) => setMgrSort(e.target.value)} style={{ ...inputSx, marginBottom: 8 }}>
          <option value="name-asc">Sort: Name A-Z</option>
          <option value="name-desc">Sort: Name Z-A</option>
        </select>
        <div style={{ border: "1px solid var(--border)", borderRadius: 10, maxHeight: 440, overflowY: "auto", background: "var(--surface)" }}>
          {sortedMgr.map((m) => {
            const active = m.id === selectedManagerId;
            return (
              <button
                key={m.id}
                type="button"
                onClick={() => setSelectedManagerId(m.id)}
                style={{ width: "100%", textAlign: "left", padding: "10px 12px", border: "none", borderBottom: "1px solid var(--border)", background: active ? "var(--primary-light)" : "var(--surface)", cursor: "pointer" }}
              >
                <div style={{ fontWeight: 600, fontSize: 14 }}>{m.name}</div>
                <div style={{ fontSize: 12, color: "var(--text-3)" }}>{m.email || "—"}</div>
              </button>
            );
          })}
          {sortedMgr.length === 0 && <div style={{ padding: 12, color: "var(--text-3)", fontSize: 13 }}>No managers match.</div>}
        </div>
      </div>

      <div style={{ flex: 1, minWidth: 280, background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 10, padding: 20 }}>
        {!sel && <p style={{ color: "var(--text-2)" }}>Select a manager from the list.</p>}
        {sel && (
          <>
            <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 12 }}>{sel.name}</h2>
            <div style={{ display: "grid", gap: 8, fontSize: 14, color: "var(--text-2)", marginBottom: 16 }}>
              <div><span style={{ color: "var(--text-3)", fontWeight: 600 }}>Email</span> {sel.email || "—"}</div>
              <div><span style={{ color: "var(--text-3)", fontWeight: 600 }}>SMS to</span> {maskPhone(sel.phone)}</div>
              <div><span style={{ color: "var(--text-3)", fontWeight: 600 }}>User id</span> {sel.id}</div>
            </div>
            <button type="button" onClick={() => setGroupModalOpen(true)} style={{ ...primaryBtn, marginBottom: 16 }}>
              Assign groups from list…
            </button>
            <div style={{ fontSize: 12, color: "var(--text-2)", marginBottom: 12 }}>
              What this affects: this manager's group links control visible schedules and recipients.
            </div>
            <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text-3)", marginBottom: 6 }}>Assigned groups ({assignedIds.length})</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {assignedIds.map((gid) => (
                <span key={gid} style={{ fontSize: 12, padding: "4px 10px", borderRadius: 99, background: "var(--bg)", border: "1px solid var(--border)" }}>
                  {groupNameById[gid] || `Group ${gid}`}
                </span>
              ))}
              {assignedIds.length === 0 && <span style={{ fontSize: 13, color: "var(--text-3)" }}>None yet.</span>}
            </div>
          </>
        )}
      </div>

      {groupModalOpen && sel && (
        <AdminSearchableGroupPickModal
          title={`Assign groups — ${sel.name}`}
          initialSelected={assignedIds}
          onClose={() => setGroupModalOpen(false)}
          onSave={applyManagerGroups}
        />
      )}
    </div>
  );
};

const ManagerQuestionsPanel = () => {
  const { questions, token, refresh } = useAppData();
  const [text,    setText]   = useState("");
  const [edit,    setEdit]   = useState(null); // { id, text, __baselineText }
  const [qSearch, setQSearch] = useState("");
  const [saving,  setSaving] = useState(false);

  const add = async () => {
    if (!text.trim()) { toastError("Question text is required."); return; }
    setSaving(true);
    try {
      await apiFetch("/questions", token, { method: "POST", body: { text: text.trim() } });
      await refresh();
      setText("");
      toastSuccess("Question added.");
    } catch (err) {
      toastError(`Could not add question: ${err.message}`);
    } finally {
      setSaving(false);
    }
  };

  const remove = async (id) => {
    setSaving(true);
    try {
      await apiFetch(`/questions/${id}`, token, { method: "DELETE" });
      await refresh();
      toastSuccess("Question removed.");
    } catch (err) {
      toastError(`Could not remove question: ${err.message}`);
    } finally {
      setSaving(false);
    }
  };

  const saveEdit = async () => {
    if (!edit?.text.trim()) { toastError("Could not save question: text is required."); return; }
    setSaving(true);
    try {
      await apiFetch(`/questions/${edit.id}`, token, { method: "PATCH", body: { text: edit.text.trim() } });
      await refresh();
      setEdit(null);
      toastSuccess("Question updated.");
    } catch (err) {
      toastError(`Could not save question: ${err.message}`);
    } finally {
      setSaving(false);
    }
  };

  const filteredList = questions.filter((q) =>
    !qSearch.trim() || (q.text || "").toLowerCase().includes(qSearch.trim().toLowerCase())
  );

  return (
    <div style={{ maxWidth: 640 }}>
      <div style={{ marginBottom: 12, fontSize: 12, color: "var(--text-3)" }}>
        {questions.length} question{questions.length !== 1 ? "s" : ""} · All optional
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <input placeholder="New question text" value={text} onChange={(e) => setText(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && add()} style={inputSx} />
        <button type="button" onClick={add} disabled={saving}
          style={{ background: "var(--primary)", color: "#fff", borderRadius: 8, padding: "0 16px", fontWeight: 600, opacity: saving ? 0.6 : 1 }}>
          Add
        </button>
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
        <input placeholder="Search questions…" value={qSearch} onChange={(e) => setQSearch(e.target.value)} style={{ ...inputSx, marginBottom: 0 }} />
      </div>
      <div style={{ border: "1px solid var(--border)", borderRadius: 10, overflow: "hidden", maxHeight: 480, overflowY: "auto" }}>
        {filteredList.map((q) => (
          <div key={q.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 14px", borderBottom: "1px solid var(--border)", fontSize: 14 }}>
            <span>{q.text}</span>
            <div style={{ display: "flex", gap: 8 }}>
              <button type="button" onClick={() => setEdit({ id: q.id, text: q.text, __baselineText: q.text })}
                style={{ fontWeight: 600, color: "var(--primary)", fontSize: 13 }}>
                Edit
              </button>
              <button type="button" onClick={() => remove(q.id)} disabled={saving}
                style={{ color: "var(--red)", fontWeight: 600, opacity: saving ? 0.6 : 1 }}>
                Remove
              </button>
            </div>
          </div>
        ))}
        {filteredList.length === 0 && (
          <div style={{ padding: 14, color: "var(--text-3)", fontSize: 14 }}>
            {questions.length === 0 ? "No questions yet — add your first question above." : "No questions match."}
          </div>
        )}
      </div>
      {edit && (
        <Modal
          title="Edit question"
          onClose={() => {
            const dirty = edit.text.trim() !== edit.__baselineText.trim();
            if (dirty && !confirmDiscardUnsaved("question editor")) return;
            setEdit(null);
          }}
          width={440}
        >
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <textarea value={edit.text} onChange={(e) => setEdit((x) => ({ ...x, text: e.target.value }))}
              rows={3} style={{ ...inputSx, resize: "vertical" }} />
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button type="button" onClick={() => setEdit(null)}
                style={{ border: "1px solid var(--border)", borderRadius: 8, padding: "8px 16px" }}>
                Cancel
              </button>
              <button type="button" onClick={saveEdit} disabled={saving}
                style={{ background: "var(--primary)", color: "#fff", borderRadius: 8, padding: "8px 16px", fontWeight: 600, opacity: saving ? 0.6 : 1 }}>
                {saving ? "Saving…" : "Save"}
              </button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

  const filtered = participants.filter(p => {

  return (

            }}>
              {p.active ? "Active" : "Inactive"}
            </span>
            {p.smsOptedOut && (
              <span style={{ fontSize: 11, fontWeight: 600, color: "var(--amber)", background: "var(--amber-bg)", borderRadius: 99, padding: "2px 8px" }}>
                SMS opt-out
              </span>
            )}
          </div>
        ))}
      </div>
    </div>
  );
