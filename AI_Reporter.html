      recipientMode: mode,
      employeeIds: mode === "subset" ? subsetIds : [],
      questionIds: qids,
    };
  };

  const openReviewForAdd = () => {
    const draft = buildPendingScheduleDraft();
    if (!draft) return;
    setReviewDraft(draft);
  };

  const confirmAddJob = async () => {
    if (!reviewDraft || saving) return;
    setSaving(true);
    try {
      const newSchedule = await apiFetch("/schedules", token, {
        method: "POST",
        body: {
          label: reviewDraft.label,
          dayOfWeek: reviewDraft.day,
          timeOfDay: reviewDraft.time,
          timezone: reviewDraft.timezone,
          recipientMode: reviewDraft.recipientMode,
          active: true,
        },
      });
      const newId = newSchedule.id;

      for (const qid of reviewDraft.questionIds) {
        await apiFetch(`/schedules/${newId}/questions`, token, {
          method: "POST",
          body: { questionId: qid },
        });
      }

      if (reviewDraft.recipientMode === "subset") {
        for (const uid of reviewDraft.employeeIds) {
          await apiFetch(`/schedules/${newId}/recipients`, token, {
            method: "POST",
            body: { userId: uid },
          });
        }
      }

      await refresh();
      setSubsetIds([]);
      setShowAddModal(false);
      setReviewDraft(null);
      toastSuccess("Schedule added.");
    } catch (err) {
      toastError("Failed to create schedule: " + err.message);
    } finally {
      setSaving(false);
    }
  };

  const remove = async (id) => {
    const target = schedules.find((j) => j.id === id);
    if (!target) return;
    if (!confirm(`Remove schedule "${target.label}"?`)) return;
    setSaving(true);
    try {
      await apiFetch(`/schedules/${id}`, token, { method: "DELETE" });
      await refresh();
      toastSuccess("Schedule removed.");
    } catch (err) {
      toastError("Unexpected error: " + err.message);
    } finally {
      setSaving(false);
    }
  };

  const patchJob = async (id, patch) => {
    setSaving(true);
    try {
      await apiFetch(`/schedules/${id}`, token, {
        method: "PATCH",
        body: patch,
      });
      await refresh();
      if (Object.prototype.hasOwnProperty.call(patch, "active")) {
        toastSuccess(`Schedule ${patch.active ? "activated" : "paused"}.`);
      }
    } catch (err) {
      toastError("Failed to update schedule: " + err.message);
    } finally {
      setSaving(false);
    }
  };

  const toggleJobQuestion = async (job, qid) => {
    const cur = new Set(job.questionIds || []);
    setSaving(true);
    try {
      if (cur.has(qid)) {
        await apiFetch(`/schedules/${job.id}/questions/${qid}`, token, { method: "DELETE" });
      } else {
        await apiFetch(`/schedules/${job.id}/questions`, token, {
          method: "POST",
          body: { questionId: qid },
        });
      }
      await refresh();
      toastSuccess("Schedule questions updated.");
    } catch (err) {
      toastError("Unexpected error: " + err.message);
    } finally {
      setSaving(false);
    }
  };

  const toggleSubset = (empId) => {
    setSubsetIds((s) => (s.includes(empId) ? s.filter((x) => x !== empId) : [...s, empId]));
  };

  const toggleNewQuestion = (qid) => {
    setNewQIds((prev) => {
      const n = new Set(prev);
      if (n.has(qid)) n.delete(qid);
      else n.add(qid);
      return n;
    });
  };

  const qModalFilter = (q) => {
    if (!modalQSearch.trim()) return true;
    return (q.text || "").toLowerCase().includes(modalQSearch.trim().toLowerCase());
  };
  const empModalFilter = (e) => {
    if (!modalEmpSearch.trim()) return true;
    const t = modalEmpSearch.trim().toLowerCase();
    return (e.name || "").toLowerCase().includes(t) || String(e.id).includes(t);
  };
  const questionsInModal = questions.filter(qModalFilter);
  const rosterInModal = participants.filter(empModalFilter);

  const isAddScheduleDirty = () => {
    const labelDirty = String(label || "").trim() !== "Weekly send";
    const dayDirty = day !== "Sunday";
    const timeDirty = time !== "08:00";
    const modeDirty = mode !== "all";
    const subsetDirty = subsetIds.length > 0;
    const desiredDefault = new Set(questions.map((q) => q.id));
    const draftSet = new Set(newQIds);
    const questionDirty =
      draftSet.size !== desiredDefault.size || [...draftSet].some((id) => !desiredDefault.has(id));
    return labelDirty || dayDirty || timeDirty || modeDirty || subsetDirty || questionDirty;
  };

  const requestCloseAddSchedule = () => {
    if (isAddScheduleDirty() && !confirmDiscardUnsaved("schedule editor")) return;
    setReviewDraft(null);
    setShowAddModal(false);
  };

  return (
    <div style={{ maxWidth: 720, opacity: saving ? 0.7 : 1, pointerEvents: saving ? "none" : "auto" }}>
      <p style={{ color: "var(--text-2)", marginBottom: 16, fontSize: 14 }}>
        Schedules decide who receives prompts and which questions are asked each cycle.
      </p>

      <div style={{ marginBottom: 20 }}>
        <button type="button" onClick={openAddModal} style={{ background: "var(--primary)", color: "#fff", borderRadius: 8, padding: "9px 18px", fontWeight: 600 }}>
          Add schedule…
        </button>
      </div>

      {showAddModal && (
        <Modal title="Add schedule" onClose={requestCloseAddSchedule} width={580}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14, maxHeight: "min(78vh, 640px)" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 110px 90px 130px", gap: 10 }}>
              <input placeholder="Label" value={label} onChange={(e) => setLabel(e.target.value)} style={inputSx} />
              <select value={day} onChange={(e) => setDay(e.target.value)} style={inputSx}>
                {["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"].map((d) => (
                  <option key={d} value={d}>{d}</option>
                ))}
              </select>
              <input type="time" value={time} onChange={(e) => setTime(e.target.value)} style={inputSx} />
              <select value={timezone} onChange={(e) => setTimezone(e.target.value)} style={inputSx}>
                {SCHEDULE_TIMEZONES.map((tz) => (
                  <option key={tz.value} value={tz.value}>{tz.label}</option>
                ))}
              </select>
            </div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text-3)", marginBottom: 6 }}>Questions to include</div>
              <input placeholder="Search questions…" value={modalQSearch} onChange={(e) => setModalQSearch(e.target.value)} style={{ ...inputSx, marginBottom: 8 }} />
              <div style={{ border: "1px solid var(--border)", borderRadius: 8, maxHeight: 200, overflowY: "auto", padding: "6px 8px", display: "flex", flexDirection: "column", gap: 6 }}>
                {questionsInModal.map((q) => (
                  <label key={q.id} style={{ fontSize: 14 }}>
                    <input type="checkbox" checked={newQIds.has(q.id)} onChange={() => toggleNewQuestion(q.id)} /> {q.text}
                  </label>
                ))}
                {questions.length === 0 && <span style={{ fontSize: 13, color: "var(--text-3)" }}>Add questions in the Questions tab first.</span>}
                {questions.length > 0 && questionsInModal.length === 0 && <span style={{ fontSize: 13, color: "var(--text-3)" }}>No questions match search.</span>}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text-3)", marginBottom: 6 }}>Recipients</div>
              <div style={{ display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
                <label style={{ fontSize: 14 }}>
                  <input type="radio" checked={mode === "all"} onChange={() => setMode("all")} /> All participants ({participants.length})
                </label>
                <label style={{ fontSize: 14 }}>
                  <input type="radio" checked={mode === "subset"} onChange={() => setMode("subset")} /> Subset
                </label>
              </div>
              {mode === "subset" && (
                <>
                  <input placeholder="Search participants…" value={modalEmpSearch} onChange={(e) => setModalEmpSearch(e.target.value)} style={{ ...inputSx, marginTop: 10, marginBottom: 8 }} />
                  <div style={{ border: "1px solid var(--border)", borderRadius: 8, maxHeight: 200, overflowY: "auto", padding: "6px 8px", display: "flex", flexDirection: "column", gap: 6 }}>
                    {rosterInModal.map((e) => (
                      <label key={e.id} style={{ fontSize: 14 }}>
                        <input type="checkbox" checked={subsetIds.includes(e.id)} onChange={() => toggleSubset(e.id)} /> {e.name}
                      </label>
                    ))}
                    {participants.length === 0 && <span style={{ fontSize: 13, color: "var(--text-3)" }}>No participants yet.</span>}
                    {participants.length > 0 && rosterInModal.length === 0 && <span style={{ fontSize: 13, color: "var(--text-3)" }}>No participants match search.</span>}
                  </div>
                </>
              )}
            </div>
            <div style={{ fontSize: 12, color: "var(--text-2)", background: "var(--surface-alt)", border: "1px solid var(--border)", borderRadius: 8, padding: "8px 10px" }}>
              Recipient scope: <b>{mode === "all" ? "All participants" : "Subset"}</b> · Count: <b>{mode === "all" ? participants.length : subsetIds.length}</b> · Questions selected: <b>{newQIds.size}</b>
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: "auto", paddingTop: 8 }}>
              <button type="button" onClick={requestCloseAddSchedule} style={{ border: "1px solid var(--border)", borderRadius: 8, padding: "8px 16px" }}>
                Cancel
              </button>
              <button type="button" onClick={openReviewForAdd} style={{ background: "var(--primary)", color: "#fff", borderRadius: 8, padding: "8px 16px", fontWeight: 600 }}>
                Review
              </button>
            </div>
          </div>
        </Modal>
      )}

      {reviewDraft && (
        <Modal title="Review schedule before save" onClose={() => setReviewDraft(null)} width={520}>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ fontSize: 13, color: "var(--text-2)" }}>
              Confirm the details below. This prevents ambiguity about who will receive the schedule.
            </div>
            <div style={{ background: "var(--surface-alt)", border: "1px solid var(--border)", borderRadius: 8, padding: "10px 12px", display: "grid", gap: 8, fontSize: 13 }}>
              <div><b>Label:</b> {reviewDraft.label}</div>
              <div><b>When:</b> {reviewDraft.day} @ {reviewDraft.time} ({SCHEDULE_TIMEZONES.find((tz) => tz.value === reviewDraft.timezone)?.label ?? reviewDraft.timezone})</div>
              <div><b>Recipients:</b> {reviewDraft.recipientMode === "all" ? `All participants (${participants.length})` : `Subset (${reviewDraft.employeeIds.length})`}</div>
              <div><b>Questions:</b> {reviewDraft.questionIds.length} selected</div>
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button type="button" onClick={() => setReviewDraft(null)} style={{ border: "1px solid var(--border)", borderRadius: 8, padding: "8px 16px" }}>
                Back
              </button>
              <button type="button" onClick={confirmAddJob} disabled={saving} style={{ background: "var(--primary)", color: "#fff", borderRadius: 8, padding: "8px 16px", fontWeight: 600, opacity: saving ? 0.6 : 1 }}>
                {saving ? "Saving…" : "Confirm and save"}
              </button>
            </div>
          </div>
        </Modal>
      )}

      <div style={{ border: "1px solid var(--border)", borderRadius: 10, overflow: "hidden" }}>
        {schedules.length === 0 && (
          <div style={{ padding: "24px", textAlign: "center", color: "var(--text-3)", fontSize: 14 }}>
            No schedules yet. Click "Add schedule…" to create one.
          </div>
        )}
        {schedules.map((j) => {
          const active = j.active !== false;
          return (
            <div key={j.id} style={{ padding: "12px 14px", borderBottom: "1px solid var(--border)", fontSize: 14 }}>
              <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 10, marginBottom: 8 }}>
                <b>{j.label}</b>
                {!active && (
                  <span style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.03em", borderRadius: 99, padding: "2px 7px", background: "var(--border)", color: "var(--text-3)" }}>
                    Paused
                  </span>
                )}
                <span style={{ color: "var(--text-3)" }}>
                  {j.dayOfWeek} @ {j.timeOfDay}
                </span>
                <span style={{ color: "var(--text-3)" }}>· {j.recipientMode === "all" ? "all participants" : `subset (${(j.employeeIds || []).length})`}</span>
                <label style={{ marginLeft: "auto", fontSize: 13, display: "flex", alignItems: "center", gap: 6 }}>
                  <input type="checkbox" checked={active} onChange={() => patchJob(j.id, { active: !active })} /> Active
                </label>
                <button type="button" onClick={() => remove(j.id)} style={{ color: "var(--red)", fontWeight: 600 }}>
                  Remove
                </button>
              </div>
              <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text-3)", marginBottom: 4 }}>Questions</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {questions.map((q) => (
                  <label key={q.id} style={{ fontSize: 13 }}>
                    <input
                      type="checkbox"
                      checked={(j.questionIds || []).includes(q.id)}
                      onChange={() => toggleJobQuestion(j, q.id)}
                    />{" "}
                    {q.text}
                  </label>
                ))}
                {questions.length === 0 && (
                  <span style={{ fontSize: 13, color: "var(--text-3)" }}>No questions configured.</span>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

</script>

const allowedPages = (role) => {

  if (role === "viewer") return ["history"];
  return [];

const ResetPasswordForm = () => {
  const { setNeedsPasswordReset } = useSession();
  const [password, setPassword] = React.useState("");
  const [confirm, setConfirm] = React.useState("");
  const [error, setError] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [done, setDone] = React.useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (password !== confirm) { setError("Passwords do not match."); return; }
    if (password.length < 8) { setError("Password must be at least 8 characters."); return; }
    setError(null);
    setLoading(true);
    try {
      const { error } = await supabaseClient.auth.updateUser({ password });
      if (error) throw error;
      setDone(true);
      setTimeout(() => setNeedsPasswordReset(false), 2000);
    } catch (err) {
      setError(err.message || "Failed to update password.");
    } finally {
      setLoading(false);
    }
  };

  const cardSx = { minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--bg)", padding: 24 };
  const innerSx = { background: "var(--surface)", padding: 32, borderRadius: 12, maxWidth: 440, width: "100%", border: "1px solid var(--border)", boxShadow: "var(--shadow)" };
  const inputSx = { width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid var(--border)", fontSize: 14, background: "var(--bg)", color: "var(--text)" };
  const labelSx = { display: "block", fontSize: 12, fontWeight: 600, marginBottom: 5, color: "var(--text-2)" };

  return (
    <div style={cardSx}>
      <div style={innerSx}>
        <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Set new password</h1>
        <p style={{ color: "var(--text-2)", fontSize: 14, marginBottom: 24 }}>AI Reporter — Hotel Operations</p>
        {done ? (
          <p style={{ color: "var(--green)", fontSize: 14 }}>Password updated. Signing you in…</p>
        ) : (
          <form onSubmit={handleSubmit}>
            <div style={{ marginBottom: 14 }}>
              <label style={labelSx}>New password</label>
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required minLength={8} autoComplete="new-password" style={inputSx} />
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={labelSx}>Confirm password</label>
              <input type="password" value={confirm} onChange={(e) => setConfirm(e.target.value)} required minLength={8} autoComplete="new-password" style={inputSx} />
            </div>
            {error && <p style={{ color: "var(--red)", fontSize: 13, marginBottom: 14 }}>{error}</p>}
            <button type="submit" disabled={loading} style={{ width: "100%", padding: 11, borderRadius: 8, background: "var(--primary)", color: "#fff", fontSize: 14, fontWeight: 600, opacity: loading ? 0.7 : 1 }}>
              {loading ? "Saving…" : "Set password"}
            </button>
          </form>
        )}
      </div>
    </div>
  );
};

  const handleForgot = async (e) => {

    setError(null);

  };

  if (view === "sent") {
    return (
      <div style={cardSx}>

          <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Check your email</h1>

          </p>
          <button onClick={() => { setView("login"); setError(null); }} style={{ fontSize: 13, color: "var(--primary)", background: "none", border: "none", cursor: "pointer", padding: 0 }}>
            Back to sign in
          </button>
        </div>
      </div>

  if (view === "forgot") {
    return (
      <div style={cardSx}>
        <div style={innerSx}>
          <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Reset password</h1>
          <p style={{ color: "var(--text-2)", fontSize: 14, marginBottom: 24 }}>Enter your email and we'll send a reset link.</p>
          <form onSubmit={handleForgot}>
            <div style={{ marginBottom: 20 }}>
              <label style={labelSx}>Email</label>
              <input type="email" value={forgotEmail} onChange={(e) => setForgotEmail(e.target.value)} required autoComplete="email" style={inputSx} />
            </div>
            {error && <p style={{ color: "var(--red)", fontSize: 13, marginBottom: 14 }}>{error}</p>}
            <button type="submit" disabled={loading} style={{ width: "100%", padding: 11, borderRadius: 8, background: "var(--primary)", color: "#fff", fontSize: 14, fontWeight: 600, opacity: loading ? 0.7 : 1, marginBottom: 14 }}>
              {loading ? "Sending…" : "Send reset link"}
            </button>
          </form>
          <button onClick={() => { setView("login"); setError(null); }} style={{ fontSize: 13, color: "var(--primary)", background: "none", border: "none", cursor: "pointer", padding: 0 }}>
            Back to sign in
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={cardSx}>
      <div style={innerSx}>
        <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Sign in</h1>
        <p style={{ color: "var(--text-2)", fontSize: 14, marginBottom: 24 }}>AI Reporter — Hotel Operations</p>
        <form onSubmit={handleSubmit}>
          <div style={{ marginBottom: 14 }}>
            <label style={labelSx}>Email</label>
            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required autoComplete="email" style={inputSx} />
          </div>
          <div style={{ marginBottom: 8 }}>
            <label style={labelSx}>Password</label>
            <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required autoComplete="current-password" style={inputSx} />
          </div>
          <div style={{ textAlign: "right", marginBottom: 20 }}>
            <button type="button" onClick={() => { setView("forgot"); setForgotEmail(email); setError(null); }} style={{ fontSize: 12, color: "var(--primary)", background: "none", border: "none", cursor: "pointer", padding: 0 }}>
              Forgot password?
            </button>
          </div>
          {error && <p style={{ color: "var(--red)", fontSize: 13, marginBottom: 14 }}>{error}</p>}
          <button type="submit" disabled={loading} style={{ width: "100%", padding: 11, borderRadius: 8, background: "var(--primary)", color: "#fff", fontSize: 14, fontWeight: 600, opacity: loading ? 0.7 : 1 }}>
            {loading ? "Signing in…" : "Sign in"}
          </button>
        </form>
      </div>
    </div>
  );
};

const ViewerManagerBar = () => {
  const { session, setViewerManager } = useSession();
  if (!session || session.role !== "viewer") return null;
  const ids = session.viewerManagerIds || [];
  if (ids.length <= 1) return null;
  return (
    <div
      style={{
        padding: "8px 16px",
        background: "var(--surface)",
        borderBottom: "1px solid var(--border)",
        display: "flex",
        alignItems: "center",
        gap: 12,
        fontSize: 13,
      }}
    >
      <span style={{ color: "var(--text-2)", fontWeight: 600 }}>Manager context</span>
      <select
        value={session.activeManagerId ?? ""}
        onChange={(e) => setViewerManager(Number(e.target.value))}
        style={{ ...inputSx, width: "auto", minWidth: 200 }}
      >
        {ids.map((mid) => {
          const u = loadPlatformUsers().find((x) => x.role === "manager" && x.managerPartitionId === mid);
          return (
            <option key={mid} value={mid}>
              {u ? u.name : "Manager"} ({mid})
            </option>
          );
        })}
      </select>
    </div>
  );
};

const defaultPageForRole = (role) => {
  if (role === "admin") return "admin";
  if (role === "manager") return "manager";
  if (role === "viewer") return "history";
  return "history";
};

const AppShell = () => {
  const { session, logout, needsPasswordReset } = useSession();
  const [page, setPage] = useState("admin");
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [isMobile, setIsMobile] = useState(() => typeof window !== "undefined" && window.innerWidth < 768);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);

  useEffect(() => {
    if (!session || session.role === "participant") return;
    setPage(defaultPageForRole(session.role));
  }, [session]);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setShowTweaks(true);
      if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
    };
    window.addEventListener("message", handler);
    return () => window.removeEventListener("message", handler);
  }, []);

  useEffect(() => {
    const onToast = (e) => {
      const d = e.detail || {};
      if (!d.message) return;
      setToasts((prev) => [...prev, d]);
      const timeout = d.type === "error" ? 3600 : 2400;
      window.setTimeout(() => {
        setToasts((prev) => prev.filter((t) => t.id !== d.id));
      }, timeout);
    };
    window.addEventListener(UI_TOAST_EVENT, onToast);
    return () => window.removeEventListener(UI_TOAST_EVENT, onToast);
  }, []);

  const onTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: next }, "*");
  };

  if (needsPasswordReset) return <ResetPasswordForm />;
  if (!session) return <LoginWall />;
  if (session.role === "participant") return <ParticipantPortal />;

  const allowed = allowedPages(session.role);
  const navigate = (p) => {
    if (allowed.includes(p)) { setPage(p); setSidebarOpen(false); }
  };

  const viewerMid = session.role === "viewer" ? session.activeManagerId : null;

  return (
    <div style={{ display: "flex", flexDirection: "column", width: "100%", height: "100vh", overflow: "hidden" }}>
      {isMobile && (
        <button
          type="button"
          aria-label="Open navigation menu"
          onClick={() => setSidebarOpen(true)}
          style={{
            position: "fixed", top: 8, left: 8, zIndex: 98,
            background: "var(--surface)", border: "1px solid var(--border)",
            borderRadius: 8, padding: "6px 10px", fontSize: 18, cursor: "pointer",
            boxShadow: "var(--shadow)", lineHeight: 1,
          }}
        >
          ☰
        </button>
      )}
      <div aria-live="polite" aria-atomic="true" style={{ position: "fixed", top: 12, right: 12, zIndex: 2600, display: "flex", flexDirection: "column", gap: 8, pointerEvents: "none", maxWidth: 360 }}>
        {toasts.map((t) => (
          <div
            key={t.id}
            role={t.type === "error" ? "alert" : "status"}
            style={{
              pointerEvents: "auto",
              background: "var(--surface)",
              border: `1px solid ${t.type === "error" ? "var(--red)" : "var(--border-strong)"}`,
              borderLeft: `4px solid ${t.type === "error" ? "var(--red)" : "var(--green)"}`,
              boxShadow: "var(--shadow-strong)",
              borderRadius: 12,
              padding: "11px 13px",
              color: "var(--text)",
              fontSize: 13,
              lineHeight: 1.4,
            }}
          >
            {t.message}
          </div>
        ))}
      </div>
      <ViewerManagerBar />
      <div style={{ display: "flex", flex: 1, overflow: "auto", minHeight: 0 }}>
        <Sidebar active={page} onNav={navigate} allowedPages={allowed} isMobile={isMobile} isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)} />
        <main style={{ flex: 1, display: "flex", overflow: "auto", background: "var(--bg)", paddingTop: isMobile ? 44 : 0 }}>
          {session.role === "admin" && page === "admin" && <AdminDashboard onNav={navigate} />}
          {session.role === "manager" && page === "manager" && <ManagerWorkspace />}
          {page === "history" && (
            <History
              managerFilterId={session.role === "viewer" ? viewerMid : session.role === "manager" ? session.id : null}
              title="Correspondences"
              subtitle={
                session.role === "viewer"
                  ? "Threads for the selected manager partition (Admin-assigned)."
                  : session.role === "manager"
                    ? "Your partition only."
                    : undefined
              }
            />
          )}
          {page === "dashboard" && <Dashboard onNav={navigate} />}
          {page === "broadcast" && <BroadcastCompose onSent={() => navigate("history")} />}
          {page === "monitor" && <Monitor />}
          {page === "integrations" && session.role === "admin" && <Integrations />}
        </main>
        <TweaksPanel show={showTweaks} tweaks={tweaks} onTweak={onTweak} />
      </div>
    </div>
  );
};

const App = () => (
  <SessionProvider>
    <AppDataProvider>
      <AppShell />
    </AppDataProvider>
  </SessionProvider>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
