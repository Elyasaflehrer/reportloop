// Supabase auth. JWT stored in memory only — never localStorage.
// Role/scope populated from GET /auth/me in Phase 5; derived from user_metadata until then.

const SessionContext = React.createContext(null);

const useSession = () => {
  const v = React.useContext(SessionContext);
  if (!v) throw new Error("useSession must be used inside SessionProvider");
  return v;
};

// Publishable keys — safe to include in frontend bundle.
// Replace with your Supabase project values before deploying.

const supabaseClient =
  SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

const mapSupabaseSession = (sb) => ({
  id: sb.user.id,
  email: sb.user.email,
  name: sb.user.user_metadata?.name || sb.user.email || "User",
  initials: ((sb.user.user_metadata?.name || sb.user.email || "??").slice(0, 2)).toUpperCase(),
  role: sb.user.user_metadata?.role || "viewer",
  title: sb.user.user_metadata?.title || "",
  // Scope derived from GET /auth/me in Phase 5; empty until then.
  viewerManagerIds: [],
  activeManagerId: null,
  accessToken: sb.access_token,
});

const SessionProvider = ({ children }) => {
  const [session, setSession] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    if (!supabaseClient) { setLoading(false); return; }
    supabaseClient.auth.getSession()
      .then(({ data: { session: sb } }) => {
        setSession(sb ? mapSupabaseSession(sb) : null);
      })
      .catch((err) => console.error("getSession failed:", err))
      .finally(() => setLoading(false));
    const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, sb) => {
      setSession(sb ? mapSupabaseSession(sb) : null);
    });
    return () => subscription.unsubscribe();
  }, []);

  const login = async ({ email, password }) => {
    if (!supabaseClient) throw new Error("Supabase is not configured.");
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) throw error;
  };

  const logout = async () => {
    if (supabaseClient) await supabaseClient.auth.signOut();
    setSession(null);
  };

  const setViewerManager = (mid) => {
    setSession((cur) => cur ? { ...cur, activeManagerId: mid } : cur);
  };

  const refreshViewerSessionFromGroups = React.useCallback(() => {
    // No-op until GET /auth/me is wired up in Phase 5.
  }, []);

  if (loading) {
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: "var(--text-2)", fontSize: 14 }}>
        Loading…
      </div>
    );
  }

  return (
    <SessionContext.Provider value={{
      session,
      login,
      logout,
      setViewerManager,
      refreshViewerSessionFromGroups,
      activeManagerId: session?.role === "viewer" ? session.activeManagerId : null,
    }}>
      {children}
    </SessionContext.Provider>
  );
};

</script>

const Avatar = ({initials, size=32, color="primary"}) => {
  const colors = {
    primary:  {bg:"var(--primary)", text:"#fff"},
    green:    {bg:"var(--green-bg)", text:"var(--green)"},
    amber:    {bg:"var(--amber-bg)", text:"var(--amber)"},
    red:      {bg:"var(--red-bg)", text:"var(--red)"},
    blue:     {bg:"var(--blue-bg)", text:"var(--blue)"},
  };
  const c = colors[color] || colors.primary;
  return (
    <div style={{width:size,height:size,borderRadius:"50%",background:c.bg,color:c.text,
      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:size*0.35,fontWeight:600,flexShrink:0,letterSpacing:"0.02em"}}>
      {initials}
    </div>

};

const StatusPill = ({status}) => {
  const map = {
    completed:   {label:"Completed",   bg:"var(--green-bg)",  color:"var(--green)"},
    "in-progress":{label:"In Progress", bg:"var(--amber-bg)",  color:"var(--amber)"},
    pending:     {label:"Pending",      bg:"var(--border)",    color:"var(--text-3)"},
  };
  const s = map[status];
  return (
    <span style={{background:s.bg,color:s.color,fontSize:11,fontWeight:600,
      padding:"2px 8px",borderRadius:99,letterSpacing:"0.04em",textTransform:"uppercase"}}>
      {s.label}
    </span>
  );
};

const OccupancyBar = ({pct}) => {
  const color = pct >= 65 ? "var(--green)" : pct >= 55 ? "var(--amber)" : "var(--red)";

      <div style={{flex:1,height:5,borderRadius:99,background:"var(--border)"}}>

// Broadcast compose screen.
// Split from AI_Reporter inline bundle.

const BroadcastCompose = ({onSent}) => {
  const [selected, setSelected] = useState([1,2,3,4,5]);
  const [step, setStep] = useState("compose"); // compose | confirm | sending | sent
  const [progress, setProgress] = useState(0);

  const toggle = id => setSelected(s => s.includes(id)?s.filter(x=>x!==id):[...s,id]);

  const confirmSend = () => {
    setStep("sending");
    let p = 0;
    const iv = setInterval(()=>{
      p += 20;
      setProgress(p);
      if(p>=100){ clearInterval(iv); setTimeout(()=>setStep("sent"),400); }
    },250);
  };

  );
};

/* source: app/05-Monitor.jsx */
// Live monitor screen and log modal.
// Split from AI_Reporter inline bundle.

const Monitor = () => {
  const [activeId, setActiveId] = useState(2);
  const [simMessages, setSimMessages] = useState(CONVERSATIONS);
  const [inputVal, setInputVal] = useState("");
  const chatRef = useRef(null);

  const conv = simMessages[activeId] || { status: "pending", startedAt: "—", messages: [] };
  const emp = EMPLOYEES.find(e=>e.id===activeId) || { name: "Unknown", property: "Unknown", phone: "—", avatar: "?" };

  useEffect(()=>{
    if(chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  },[conv?.messages, activeId]);

  const sendReply = () => {
    if(!inputVal.trim()) return;
    const txt = inputVal.trim();
    setInputVal("");
    setSimMessages(prev => ({
      ...prev,
      [activeId]: {
        ...prev[activeId],
        status:"in-progress",
        messages:[...prev[activeId].messages, {role:"mgr",text:txt}]
      }
    }));
    // Simulate AI follow-up
    setTimeout(()=>{
      const nextQ = "Thank you! How many rooms are ready to rent right now?";
      setSimMessages(prev => ({
        ...prev,
        [activeId]: {
          ...prev[activeId],
          messages:[...prev[activeId].messages, {role:"ai",text:nextQ}]
        }
      }));
    },1200);
  };

  const isBelow55 = activeId===2;

  return (
    <div style={{flex:1,display:"flex",overflowX:"auto",overflowY:"auto"}}>
      {/* Employee list */}
      <div style={{width:"min(260px, 34vw)",borderRight:"1px solid var(--border)",overflowY:"auto",padding:"16px 12px",flexShrink:0}}>
        <div style={{fontSize:11,fontWeight:600,color:"var(--text-3)",letterSpacing:"0.05em",
          textTransform:"uppercase",padding:"0 8px",marginBottom:10}}>Active Broadcast</div>
        {EMPLOYEES.map(e=>{
          const c = simMessages[e.id] || { status: "pending", messages: [] };
          const isActive = e.id===activeId;
          return (
            <button type="button" key={e.id} onClick={()=>setActiveId(e.id)} style={{
              padding:"11px 12px",borderRadius:8,marginBottom:4,cursor:"pointer",
              background:isActive?"var(--primary-light)":"transparent",
              border:`1px solid ${isActive?"var(--primary)":"transparent"}`,
              transition:"all 0.15s", width:"100%", textAlign:"left"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                <Avatar initials={e.avatar} size={30}
                  color={c.status==="completed"?"green":c.status==="in-progress"?"amber":"primary"}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:500,fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.name}</div>
                  <div style={{fontSize:11,color:"var(--text-3)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.property}</div>
                </div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <StatusPill status={c.status}/>
                  {c.status==="pending" && (
                    <span style={{fontSize:10,fontWeight:700,color:"var(--red)",background:"var(--red-bg)",
                      borderRadius:99,padding:"2px 7px",textTransform:"uppercase",letterSpacing:"0.03em"}}>
                      Overdue
                    </span>
                  )}
                </div>
                {c.occupancy && <span style={{fontSize:11,fontWeight:600,
                  color:c.occupancy>=65?"var(--green)":c.occupancy>=55?"var(--amber)":"var(--red)"}}>
                  {c.occupancy}%
                </span>}
              </div>
              {c.startedAt && c.status !== "completed" && (
                <div style={{fontSize:10,color:"var(--text-3)",marginTop:4}}>Sent {c.startedAt}</div>
              )}
            </button>
          );
        })}
      </div>

      {/* Chat panel */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Header */}
        <div style={{padding:"16px 24px",borderBottom:"1px solid var(--border)",background:"var(--surface)",
          display:"flex",alignItems:"center",gap:14,flexShrink:0}}>
          <Avatar initials={emp.avatar} size={36}
            color={conv.status==="completed"?"green":conv.status==="in-progress"?"amber":"primary"}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:15}}>{emp.name}</div>
            <div style={{fontSize:12,color:"var(--text-3)"}}>{emp.property} · {emp.phone} · Started {conv.startedAt}</div>
          </div>
          <StatusPill status={conv.status}/>
        </div>

        {/* Awaiting response banner */}
        {conv.status==="pending" && (
          <div style={{background:"var(--red-bg)",borderBottom:"1px solid oklch(90% 0.04 22)",
            padding:"10px 24px",flexShrink:0,display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:"var(--red)",fontSize:13}}>●</span>
            <span style={{fontSize:13,fontWeight:600,color:"var(--red)"}}>Awaiting first response</span>
            <span style={{fontSize:12,color:"var(--text-3)",marginLeft:4}}>— SMS sent {conv.startedAt}, no reply yet</span>
          </div>
        )}

        {/* AI tasks banner for low occupancy */}
        {isBelow55 && (
          <div style={{background:"var(--amber-bg)",borderBottom:"1px solid oklch(88% 0.06 68)",
            padding:"12px 24px",flexShrink:0}}>
            <div style={{fontWeight:600,fontSize:13,color:"var(--amber)",marginBottom:6}}>
              ⚠ Occupancy below 55% — AI has assigned advertising tasks
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {AI_TASKS_JAMES.slice(0,3).map((t,i)=>(
                <div key={i} style={{fontSize:11,background:"#fff",border:"1px solid oklch(88% 0.06 68)",
                  borderRadius:6,padding:"3px 8px",color:"var(--text-2)"}}>{t.slice(0,52)}…</div>
              ))}
              <div style={{fontSize:11,color:"var(--amber)",padding:"3px 4px",fontWeight:500}}>
                +{AI_TASKS_JAMES.length-3} more
              </div>
            </div>
          </div>
        )}

        {/* Messages */}
        <div ref={chatRef} aria-live="polite" aria-relevant="additions text" style={{flex:1,overflowY:"auto",padding:"20px 24px",display:"flex",flexDirection:"column",gap:12}}>
          {conv.messages.map((m,i)=>{
            const isAI = m.role==="ai";
            return (
              <div key={i} style={{display:"flex",flexDirection:isAI?"row":"row-reverse",gap:10,alignItems:"flex-end"}}>
                {isAI && (
                  <div style={{width:26,height:26,borderRadius:"50%",background:"var(--primary)",
                    display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginBottom:2}}>
                    <span style={{color:"#fff",fontSize:11,fontWeight:700}}>A</span>
                  </div>
                )}
                <div style={{maxWidth:"70%"}}>
                  {isAI&&<div style={{fontSize:10,color:"var(--text-3)",marginBottom:3,fontWeight:500}}>AI Reporter</div>}
                  <div style={{
                    padding:"10px 14px",borderRadius:isAI?"4px 14px 14px 14px":"14px 4px 14px 14px",
                    background:isAI?"var(--surface)":"var(--primary)",
                    color:isAI?"var(--text)":"#fff",
                    border:isAI?"1px solid var(--border)":"none",
                    fontSize:14,lineHeight:1.5,
                    boxShadow:isAI?"var(--shadow)":"none",
                  }}>{m.text}</div>
                </div>
                {!isAI && (
                  <div style={{width:26,height:26,borderRadius:"50%",background:"var(--green)",
                    display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginBottom:2}}>
                    <span style={{color:"#fff",fontSize:10,fontWeight:700}}>{emp.avatar}</span>
                  </div>
                )}
              </div>
            );
          })}
          {conv.status==="completed" && (
            <div style={{textAlign:"center",padding:"16px 0"}}>
              <span style={{background:"var(--green-bg)",color:"var(--green)",fontSize:12,fontWeight:600,
                padding:"6px 14px",borderRadius:99}}>✓ Report Complete — All topics collected</span>
            </div>
          )}
        </div>

        {/* Input */}
        {conv.status!=="completed" && (
          <div style={{padding:"14px 24px",borderTop:"1px solid var(--border)",background:"var(--surface)",flexShrink:0}}>
            <div style={{fontSize:11,color:"var(--text-3)",marginBottom:8,fontWeight:500}}>
              Simulate manager reply (demo mode)
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={inputVal} onChange={e=>setInputVal(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&sendReply()}
                placeholder="Type a reply as the manager…"
                style={{flex:1,border:"1px solid var(--border)",borderRadius:8,padding:"9px 14px",
                  fontSize:14,background:"var(--bg)"}}/>
              <button onClick={sendReply} style={{background:"var(--primary)",color:"#fff",
                borderRadius:8,padding:"9px 18px",fontWeight:600,fontSize:14}}>
                Send
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Completed report sidebar — show for completed conv */}
      {conv.status==="completed" && (
        <div style={{width:"min(260px, 34vw)",borderLeft:"1px solid var(--border)",overflowY:"auto",padding:"16px",flexShrink:0,background:"var(--surface)"}}>
          <div style={{fontSize:11,fontWeight:600,color:"var(--text-3)",letterSpacing:"0.05em",
            textTransform:"uppercase",marginBottom:12}}>Report Summary</div>
          {(() => {
            const log = FULL_LOGS[activeId];
            if (!log || !log.analysis || log.analysis.length === 0) {
              return <div style={{fontSize:13,color:"var(--text-3)",lineHeight:1.5}}>No summary available for this report.</div>;
            }
            return (
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {log.analysis.map((item, i) => (
                  <div key={i} style={{paddingBottom:8,borderBottom:"1px solid var(--border)"}}>
                    <div style={{fontSize:11,color:"var(--text-3)",fontWeight:500,marginBottom:3,lineHeight:1.4}}>{item.q}</div>
                    <div style={{fontSize:13,fontWeight:600,color:item.flag==="red"?"var(--red)":item.flag==="amber"?"var(--amber)":"var(--text)",lineHeight:1.4}}>{item.a}</div>
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
};

// ── Modal shell ──
const Modal = ({title, onClose, children, width=480}) => {
  const dialogRef = useRef(null);
  const restoreFocusRef = useRef(null);
  const titleIdRef = useRef(`modal-title-${Math.random().toString(36).slice(2, 9)}`);
  const onCloseRef = useRef(onClose);
  useEffect(() => { onCloseRef.current = onClose; });

  useEffect(() => {
    restoreFocusRef.current = document.activeElement instanceof HTMLElement ? document.activeElement : null;
    const prevOverflow = document.body.style.overflow;
    document.body.style.overflow = "hidden";

    const focusableSelector =
      'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';

    window.requestAnimationFrame(() => {
      const firstFocusable = dialogRef.current?.querySelector(focusableSelector);
      if (firstFocusable instanceof HTMLElement) firstFocusable.focus();
      else dialogRef.current?.focus();
    });

    const onKeyDown = (e) => {
      if (!dialogRef.current) return;
      if (e.key === "Escape") {
        e.preventDefault();
        onCloseRef.current();
        return;
      }
      if (e.key !== "Tab") return;

      const focusables = [...dialogRef.current.querySelectorAll(focusableSelector)].filter(
        (el) => !el.hasAttribute("disabled")
      );
      if (!focusables.length) {
        e.preventDefault();
        dialogRef.current.focus();
        return;
      }
      const first = focusables[0];
      const last = focusables[focusables.length - 1];
      const active = document.activeElement;
      if (e.shiftKey && active === first) {
        e.preventDefault();
        last.focus();
      } else if (!e.shiftKey && active === last) {
        e.preventDefault();
        first.focus();
      }
    };

    window.addEventListener("keydown", onKeyDown);
    return () => {
      window.removeEventListener("keydown", onKeyDown);
      document.body.style.overflow = prevOverflow;
      if (restoreFocusRef.current && typeof restoreFocusRef.current.focus === "function") {
        restoreFocusRef.current.focus();
      }
    };
  }, []);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(42, 50, 82, 0.26)",backdropFilter:"blur(2px)",zIndex:2000,
      display:"flex",alignItems:"center",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div
        ref={dialogRef}
        role="dialog"
        aria-modal="true"
        aria-labelledby={titleIdRef.current}
        tabIndex={-1}
        style={{width,background:"var(--surface)",borderRadius:"var(--radius)",boxShadow:"var(--shadow-strong)",
        border:"1px solid var(--border)",padding:"24px",maxHeight:"90vh",overflowY:"auto"}}
      >
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div id={titleIdRef.current} style={{fontWeight:700,fontSize:16}}>{title}</div>
          <button type="button" onClick={onClose} aria-label="Close dialog" style={{fontSize:14,fontWeight:600,color:"var(--text-2)",lineHeight:1,padding:"6px 10px",border:"1px solid var(--border)",borderRadius:8}}>Close</button>
        </div>
        {children}
      </div>
    </div>
  );
};

const QuestionsTab = () => {
  const [questions, setQuestions] = useState(initQuestions);
  const [modal, setModal] = useState(null); // null | {mode:"add"} | {mode:"edit", q}
  const [draft, setDraft] = useState({text:""});
  const [deleteId, setDeleteId] = useState(null);
  const [formError, setFormError] = useState("");
  const nextId = useRef(questions.length+1);

  const openAdd = () => { setDraft({text:""}); setFormError(""); setModal({mode:"add"}); };
  const openEdit = q => { setDraft({text:q.text}); setFormError(""); setModal({mode:"edit",q}); };

  const save = () => {
    if(!draft.text.trim()) {
      setFormError("Question text is required.");
      return;
    }
    setFormError("");
    if(modal.mode==="add"){
      setQuestions(prev=>[...prev,{id:nextId.current++,text:draft.text}]);
    } else {
      setQuestions(prev=>prev.map(q=>q.id===modal.q.id?{...q,text:draft.text}:q));
    }
    setModal(null);
  };

  const remove = id => { setQuestions(prev=>prev.filter(q=>q.id!==id)); setDeleteId(null); };

  const move = (id, dir) => {
    setQuestions(prev=>{
      const idx = prev.findIndex(q=>q.id===id);
      const next = [...prev];
      const swap = idx+dir;
      if(swap<0||swap>=next.length) return prev;
      [next[idx],next[swap]]=[next[swap],next[idx]];
      return next;
    });
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>

                style={{fontSize:10,color:i===0?"var(--border-strong)":"var(--text-3)",lineHeight:1,padding:"2px 4px",cursor:i===0?"not-allowed":"pointer",opacity:i===0?0.6:1}}

            <div style={{flex:1}}>
              <div style={{fontSize:14,color:"var(--text)",lineHeight:1.5}}>{q.text}</div>

            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}}>

          <div style={{marginTop:10,fontSize:12,color:"var(--text-3)"}}>

          </div>
        </div>

        {/* Template */}
        <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius)",
          padding:"18px 20px",boxShadow:"var(--shadow)"}}>
          <div style={{fontWeight:600,fontSize:14,marginBottom:14}}>Report template</div>
          {["Weekly Operations Report","Incident Report"].map(t=>(
            <button type="button" key={t} onClick={()=>setSched(s=>({...s,template:t}))} style={{
              display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:8,
              border:`1px solid ${sched.template===t?"var(--primary)":"var(--border)"}`,
              background:sched.template===t?"var(--primary-light)":"var(--bg)",
              cursor:"pointer",marginBottom:8,transition:"all 0.15s",width:"100%",textAlign:"left"}}>
              <div style={{width:16,height:16,borderRadius:"50%",flexShrink:0,
                border:`2px solid ${sched.template===t?"var(--primary)":"var(--border-strong)"}`,
                background:sched.template===t?"var(--primary)":"transparent",
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                {sched.template===t&&<div style={{width:6,height:6,borderRadius:"50%",background:"#fff"}}/>}
              </div>

            </button>
          ))}
        </div>

        <button onClick={saveChanges} style={{background:"var(--primary)",color:"#fff",
          borderRadius:"var(--radius)",padding:"12px",fontWeight:600,fontSize:14,
          display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {saved ? "✓ Schedule saved!" : "Save Schedule"}
        </button>
      </div>
    </div>
  );
};

const EmployeesTab = () => {

  const [submitted, setSubmitted] = useState(false);
  const nextEmpId = useRef(employees.length+1);

  const initials = name => name.trim().split(" ").filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("") || "?";

  const openAdd = () => { setDraft({name:"",property:"",phone:"",active:true}); setSubmitted(false); setModal({mode:"add"}); };
  const openEdit = e => { setDraft({name:e.name,property:e.property,phone:e.phone,active:e.active}); setSubmitted(false); setModal({mode:"edit",e}); };

  const save = () => {
    setSubmitted(true);
    if(!draft.name.trim()||!draft.phone.trim()) return;
    if(modal.mode==="add"){
      setEmployees(prev=>[...prev,{id:nextEmpId.current++,...draft,avatar:initials(draft.name)}]);
    } else {
      setEmployees(prev=>prev.map(e=>e.id===modal.e.id?{...e,...draft,avatar:initials(draft.name)}:e));

    setModal(null);
  };

  const toggleActive = id => setEmployees(prev=>prev.map(e=>e.id===id?{...e,active:!e.active}:e));
  const remove = id => { setEmployees(prev=>prev.filter(e=>e.id!==id)); setDeleteId(null); };

  const active = employees.filter(e=>e.active);
  const inactive = employees.filter(e=>!e.active);

                <div style={{borderTop:"1px solid var(--border)",padding:"10px 18px 16px"}}>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {batch.questions.map((q,qi)=>(
                      <div key={qi} style={{display:"flex",alignItems:"flex-start",gap:10,
                        padding:"9px 12px",borderRadius:8,background:"var(--bg)"}}>
                        <div style={{width:20,height:20,borderRadius:"50%",background:"var(--primary-light)",
                          display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,
                          fontSize:10,fontWeight:700,color:"var(--primary)"}}>{qi+1}</div>
                        <span style={{fontSize:13,color:"var(--text)",lineHeight:1.5,
                          // Highlight search match
                          ...(search.trim() ? {} : {})}}>
                          {search.trim() ? (() => {
                            const idx = q.toLowerCase().indexOf(search.toLowerCase());
                            if(idx===-1) return q;
                            return <>{q.slice(0,idx)}<mark style={{background:"#fff2c7",borderRadius:3,padding:"0 2px"}}>{q.slice(idx,idx+search.length)}</mark>{q.slice(idx+search.length)}</>;
                          })() : q}
                        </span>
                      </div>
                    ))}
                  </div>
                  {search.trim() && batch.questions.length > 0 && (
                    <div style={{marginTop:8,fontSize:12,color:"var(--amber)",fontWeight:500}}>
                      {batch.questions.length} match{batch.questions.length!==1?"es":""} for "{search}"
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
        {filtered.length===0&&(
          <div style={{textAlign:"center",padding:"40px 0",color:"var(--text-3)"}}>
            No questions found matching "{search}"
          </div>
        )}
      </div>
    </div>
  );
};

const groupsForUserId = (userId) =>
  loadGroupMembers().filter((m) => m.userId === userId).map((m) => m.groupId);

const setUserGroupMemberships = (userId, groupIdSet) => {
  const gidSet = new Set(groupIdSet);
  const members = loadGroupMembers().filter((m) => !(m.userId === userId));
  const groups = loadGroups();
  for (const g of groups) {
    if (gidSet.has(g.id)) members.push({ groupId: g.id, userId });
  }
  saveGroupMembers(members);
};

const primaryBtn = {
  background: "var(--primary)",
  color: "#fff",
  borderRadius: 10,
  padding: "9px 16px",
  fontWeight: 600,
  fontSize: 14,
  boxShadow: "0 6px 16px rgba(91, 109, 245, 0.22)",
};

const maskPhone = (p) => {
  if (!p || !String(p).trim()) return "—";
  const s = String(p).trim();
  if (s.length <= 4) return "••••";
  return `••••${s.slice(-4)}`;
};

/** Searchable multi-select groups; `initialSelected` is array of group ids */
const AdminSearchableGroupPickModal = ({ title, initialSelected, onClose, onSave }) => {
  const [q, setQ] = useState("");
  const [sel, setSel] = useState(() => new Set(initialSelected));
  const groups = loadGroups().filter((g) => !q.trim() || g.name.toLowerCase().includes(q.trim().toLowerCase()));

  const toggle = (gid) => {
    setSel((prev) => {
      const n = new Set(prev);
      if (n.has(gid)) n.delete(gid);
      else n.add(gid);
      return n;
    });
  };

  return (
    <Modal title={title} onClose={onClose} width={480}>
      <input placeholder="Search groups…" value={q} onChange={(e) => setQ(e.target.value)} style={{ ...inputSx, marginBottom: 12 }} />
      <div style={{ maxHeight: 320, overflowY: "auto", border: "1px solid var(--border)", borderRadius: 8, padding: 8 }}>
        {groups.map((g) => (
          <label key={g.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 4px", fontSize: 14 }}>
            <input type="checkbox" checked={sel.has(g.id)} onChange={() => toggle(g.id)} />
            {g.name}
          </label>
        ))}
        {groups.length === 0 && <div style={{ color: "var(--text-3)", fontSize: 13 }}>No matches.</div>}
      </div>
      <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 16 }}>
        <button type="button" onClick={onClose} style={{ border: "1px solid var(--border)", borderRadius: 8, padding: "8px 16px" }}>
          Cancel
        </button>
        <button type="button" onClick={() => onSave([...sel])} style={primaryBtn}>
          Save
        </button>
      </div>
    </Modal>
  );
};

const AdminUsersTab = () => {
  const { refreshViewerSessionFromGroups } = useSession();
  const [rows, setRows] = useState(() => loadPlatformUsers());
  const [rowQuery, setRowQuery] = useState("");
  const [draft, setDraft] = useState({
    name: "",
    email: "",
    phone: "",
    role: "viewer",
  });
  const [sortBy, setSortBy] = useState("name-asc");
  const [filterRole, setFilterRole] = useState("all");
  const [filterGroupName, setFilterGroupName] = useState("");
  const [filterManagerPartition, setFilterManagerPartition] = useState("");
  const [density, setDensity] = useState("comfortable");
  const [edit, setEdit] = useState(null); // copy of row while editing in modal
  const [groupPickUserId, setGroupPickUserId] = useState(null);
  const [viewGroupsUserId, setViewGroupsUserId] = useState(null);
  const [selectedUserIds, setSelectedUserIds] = useState(() => new Set());
  const [bulkGroupModalOpen, setBulkGroupModalOpen] = useState(false);
  const [pendingRemoveUserId, setPendingRemoveUserId] = useState(null);

  const persist = (next) => {
    setRows(next);
    savePlatformUsers(next);
  };

  const addUser = () => {
    if (!draft.name.trim() || !draft.email.trim()) {
      toastError("Could not add user: name and email are required.");
      return;
    }
    const id = Math.max(0, ...rows.map((r) => r.id)) + 1;
    const initials = draft.name
      .split(/\s+/)
      .map((s) => s[0])
      .join("")
      .slice(0, 2)
      .toUpperCase();
    const base = {
      id,
      name: draft.name.trim(),
      email: draft.email.trim(),
      phone: (draft.phone || "").trim(),
      initials,
      title: draft.role === "admin" ? "Admin" : draft.role === "manager" ? "Manager" : "Viewer",
      role: draft.role,
    };
    if (draft.role === "manager") {
      base.managerPartitionId = id;
    }
    if (draft.role === "viewer") {
      base.viewerManagerIds = getViewerManagerPartitionIdsFromGroups(id);
    }
    persist([...rows, base]);
    setDraft({ name: "", email: "", phone: "", role: "viewer" });
    toastSuccess(`User added: ${base.name}.`);
  };

  const remove = (id) => {
    const removed = rows.find((r) => r.id === id);
    persist(rows.filter((r) => r.id !== id));
    setSelectedUserIds((prev) => {
      const n = new Set(prev);
      n.delete(id);
      return n;
    });
    toastSuccess(`User removed${removed ? `: ${removed.name}` : ""}.`);
  };

  const saveEdit = () => {
    if (!edit) return;
    if (!edit.name?.trim() || !edit.email?.trim()) {
      toastError("Could not save user: name and email are required.");
      return;
    }
    persist(
      rows.map((r) => {
        if (r.id !== edit.id) return r;
        let n = {
          ...r,
          name: edit.name.trim(),
          email: edit.email.trim(),
          phone: (edit.phone || "").trim(),
          role: edit.role,
          title: edit.role === "admin" ? "Admin" : edit.role === "manager" ? "Manager" : "Viewer",
        };
        if (edit.role === "manager") {
          n.managerPartitionId = edit.managerPartitionId != null ? edit.managerPartitionId : edit.id;
        }
        else delete n.managerPartitionId;
        if (edit.role === "viewer") {
          n.viewerManagerIds = getViewerManagerPartitionIdsFromGroups(r.id);
        } else delete n.viewerManagerIds;
        if (edit.role === "admin") {
          delete n.managerPartitionId;
          delete n.viewerManagerIds;
        }
        return n;
      })
    );
    setEdit(null);
    refreshViewerSessionFromGroups();
    toastSuccess("User changes saved.");
  };

  const isUserEditDirty = (e) => {
    if (!e || !e.__baseline) return false;
    const cur = {
      name: String(e.name || "").trim(),
      email: String(e.email || "").trim(),
      phone: String(e.phone || "").trim(),
      role: e.role,
    };
    const base = e.__baseline;
    return cur.name !== base.name || cur.email !== base.email || cur.phone !== base.phone || cur.role !== base.role;
  };

  const requestCloseUserEdit = () => {
    if (edit && isUserEditDirty(edit) && !confirmDiscardUnsaved("user editor")) return;
    setEdit(null);
  };

  const groupNameById = React.useMemo(() => {
    const map = {};
    loadGroups().forEach((g) => {
      map[g.id] = g.name;
    });
    return map;
  }, [rows]);

  const groupNamesForUser = (userId) =>
    groupsForUserId(userId).map((gid) => groupNameById[gid] || `Group ${gid}`);

  const groupSortKeyForUser = (userId) => {
    const names = groupNamesForUser(userId).map((n) => String(n).toLowerCase()).sort();
    if (!names.length) return "~~~"; // push ungrouped users toward the end
    return names.join(" | ");
  };

  const filteredRows = rows.filter((r) => {
    const q = rowQuery.trim().toLowerCase();
    const groupsText = groupNamesForUser(r.id).join(" ").toLowerCase();
    const baseMatch =
      !q ||
      (r.name || "").toLowerCase().includes(q) ||
      (r.email || "").toLowerCase().includes(q) ||
      String(r.role || "").toLowerCase().includes(q) ||
      groupsText.includes(q);
    if (!baseMatch) return false;
    if (filterRole !== "all" && r.role !== filterRole) return false;
    if (filterGroupName.trim() && !groupsText.includes(filterGroupName.trim().toLowerCase())) return false;
    if (filterManagerPartition.trim()) {
      const part = String(r.managerPartitionId ?? "");
      if (!part.includes(filterManagerPartition.trim())) return false;
    }
    return true;
  });

  const sortedRows = [...filteredRows].sort((a, b) => {
    if (sortBy === "name-asc") return String(a.name || "").localeCompare(String(b.name || ""));
    if (sortBy === "name-desc") return String(b.name || "").localeCompare(String(a.name || ""));
    if (sortBy === "role") return String(a.role || "").localeCompare(String(b.role || ""));
    if (sortBy === "groups-desc") return groupsForUserId(b.id).length - groupsForUserId(a.id).length;
    if (sortBy === "groups-name") {
      const aKey = groupSortKeyForUser(a.id);
      const bKey = groupSortKeyForUser(b.id);
      if (aKey === bKey) return String(a.name || "").localeCompare(String(b.name || ""));
      return aKey.localeCompare(bKey);
    }
    return 0;
  });
  const visibleUserIds = new Set(sortedRows.map((r) => r.id));
  const selectedVisibleUserIds = [...selectedUserIds].filter((uid) => visibleUserIds.has(uid));
  const hiddenSelectedUserIds = [...selectedUserIds].filter((uid) => !visibleUserIds.has(uid));

  const toggleSelectedUser = (uid) => {
    setSelectedUserIds((prev) => {
      const n = new Set(prev);
      if (n.has(uid)) n.delete(uid);
      else n.add(uid);
      return n;
    });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 10, padding: 20 }}>
        <div style={{ fontWeight: 700, marginBottom: 12 }}>Add user (demo)</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 10 }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-3)", marginBottom: 4 }}>Name</div>
            <input aria-label="User name" placeholder="Name" value={draft.name} onChange={(e) => setDraft((d) => ({ ...d, name: e.target.value }))} style={inputSx} />
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-3)", marginBottom: 4 }}>Email</div>
            <input aria-label="User email" placeholder="Email" value={draft.email} onChange={(e) => setDraft((d) => ({ ...d, email: e.target.value }))} style={inputSx} />
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-3)", marginBottom: 4 }}>SMS to (phone)</div>
            <input
              aria-label="User phone number"
              placeholder="+1…"
              value={draft.phone}
              onChange={(e) => setDraft((d) => ({ ...d, phone: e.target.value }))}
              style={inputSx}
            />
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-3)", marginBottom: 4 }}>Role</div>
            <select aria-label="User role" value={draft.role} onChange={(e) => setDraft((d) => ({ ...d, role: e.target.value }))} style={inputSx}>
              <option value="admin">admin</option>
              <option value="manager">manager</option>
              <option value="viewer">viewer</option>
            </select>
          </div>
          {draft.role === "manager" ? (
            <div style={{ fontSize: 13, color: "var(--text-2)", padding: "8px 0", alignSelf: "center", gridColumn: "1 / -1" }}>
              User ID and manager partition are assigned automatically when you save.
            </div>
          ) : draft.role === "viewer" ? (
            <div style={{ fontSize: 13, color: "var(--text-2)", padding: "8px 0", alignSelf: "center", gridColumn: "1 / -1" }}>
              Viewer manager access comes from <b>Groups</b> membership (not typed here). Add the user to groups that are linked to managers.
            </div>
          ) : (
            <div style={{ gridColumn: "1 / -1" }} />
          )}
        </div>
        <button type="button" onClick={addUser} style={{ marginTop: 12, ...primaryBtn }}>
          Add user
        </button>
      </div>

      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
        <input aria-label="Search users by name email role or group" placeholder="Search users by name/email/role/group…" value={rowQuery} onChange={(e) => setRowQuery(e.target.value)} style={{ ...inputSx, maxWidth: 320 }} />
        <select aria-label="Filter users by role" value={filterRole} onChange={(e) => setFilterRole(e.target.value)} style={{ ...inputSx, width: 140 }}>
          <option value="all">Role: All</option>
          <option value="admin">Role: Admin</option>
          <option value="manager">Role: Manager</option>
          <option value="viewer">Role: Viewer</option>
        </select>
        <input
          aria-label="Filter users by group name"
          placeholder="Filter group name…"
          value={filterGroupName}
          onChange={(e) => setFilterGroupName(e.target.value)}
          style={{ ...inputSx, width: 180 }}
        />
        <input
          aria-label="Filter users by manager partition"
          placeholder="Manager partition…"
          value={filterManagerPartition}
          onChange={(e) => setFilterManagerPartition(e.target.value)}
          style={{ ...inputSx, width: 170 }}
        />
        <select aria-label="Sort users table" value={sortBy} onChange={(e) => setSortBy(e.target.value)} style={{ ...inputSx, width: 200 }}>
          <option value="name-asc">Sort: Name A-Z</option>
          <option value="name-desc">Sort: Name Z-A</option>
          <option value="role">Sort: Role</option>
          <option value="groups-name">Sort: Group (by name)</option>
          <option value="groups-desc">Sort: Groups (high-low)</option>
        </select>
        <select aria-label="Table row density" value={density} onChange={(e) => setDensity(e.target.value)} style={{ ...inputSx, width: 170 }}>
          <option value="comfortable">Density: Comfortable</option>
          <option value="compact">Density: Compact</option>
        </select>
        <button
          type="button"
          disabled={selectedVisibleUserIds.length === 0}
          onClick={() => {
            if (hiddenSelectedUserIds.length > 0) {
              toastError(`Ignoring ${hiddenSelectedUserIds.length} selected user(s) hidden by current filters.`);
            }
            setBulkGroupModalOpen(true);
          }}
          style={{
            ...primaryBtn,
            opacity: selectedVisibleUserIds.length === 0 ? 0.5 : 1,
            cursor: selectedVisibleUserIds.length === 0 ? "not-allowed" : "pointer",
          }}
        >
          Replace groups for selected ({selectedVisibleUserIds.length})
        </button>
      </div>

      <div role="table" aria-label="Users and roles table" style={{ border: "1px solid var(--border)", borderRadius: 10, overflow: "auto", maxHeight: 540 }}>
        <div role="row"
          style={{
            display: "grid",
            gridTemplateColumns: "34px 1fr 1fr 100px 100px 80px 140px",
            minWidth: 780,
            gap: 8,
            padding: "10px 14px",
            borderBottom: "1px solid var(--border)",
            fontSize: 12,
            fontWeight: 600,
            color: "var(--text-3)",
            background: "var(--bg)",
            position: "sticky",
            top: 0,
            zIndex: 2,
          }}
        >
          <span role="columnheader">Select</span>
          <span role="columnheader">Name</span>
          <span role="columnheader">Email</span>
          <span role="columnheader">Role</span>
          <span role="columnheader">SMS (masked)</span>
          <span role="columnheader">Groups</span>
          <span role="columnheader">Actions</span>
        </div>
        <div role="rowgroup">
        {sortedRows.map((r, idx) => (
          <div
            role="row"
            key={r.id}
            style={{
              display: "grid",
              gridTemplateColumns: "34px 1fr 1fr 100px 100px 80px 140px",
              minWidth: 780,
              gap: 8,
              padding: density === "compact" ? "8px 14px" : "12px 14px",
              borderBottom: "1px solid var(--border)",
              alignItems: "center",
              fontSize: 14,
              background: idx % 2 ? "var(--surface)" : "oklch(99% 0.003 240)",
            }}
          >
            <span role="cell"><input type="checkbox" aria-label={`Select user ${r.name}`} checked={selectedUserIds.has(r.id)} onChange={() => toggleSelectedUser(r.id)} /></span>

              title={r.name}
              style={{ fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}
            >
              {r.name}
            </span>
            <span role="cell"
              title={r.email}
              style={{ color: "var(--text-2)", fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}
            >
              {r.email}
            </span>
            <span role="cell">{r.role}</span>
            <span role="cell" style={{ fontFamily: "ui-monospace, monospace", fontSize: 12 }}>{maskPhone(r.phone)}</span>
            <span role="cell">
              <button
                type="button"
                onClick={() => setViewGroupsUserId(r.id)}
                style={{
                  fontSize: 12,

const AdminGroupsTab = () => {
  const { refreshViewerSessionFromGroups } = useSession();
  const [groups, setGroups] = useState(() => loadGroups());
  const [members, setMembers] = useState(() => loadGroupMembers());
  const [modal, setModal] = useState(null); // null | { id?: number, name: string, description: string }

  const refresh = () => {
    setGroups(loadGroups());
    setMembers(loadGroupMembers());
  };

  const openCreate = () => setModal({ name: "", description: "", __baseline: { name: "", description: "" } });
  const openEdit = (g) => {
    setMembers(loadGroupMembers());
    setModal({
      id: g.id,
      name: g.name,
      description: g.description || "",
      __baseline: { name: String(g.name || ""), description: String(g.description || "") },
    });
  };

  const saveModal = () => {
    if (!modal || !modal.name.trim()) {
      toastError("Could not save group: name is required.");
      return;
    }
    let nextG = loadGroups();
    if (modal.id == null) {
      const gid = Math.max(0, ...nextG.map((x) => x.id)) + 1;
      nextG = [...nextG, { id: gid, name: modal.name.trim(), description: (modal.description || "").trim() || undefined }];
      saveGroups(nextG);
      refresh();
      setModal({ id: gid, name: modal.name.trim(), description: (modal.description || "").trim() });
      toastSuccess("Group created.");
      return;
    }
    nextG = nextG.map((x) =>
      x.id === modal.id ? { ...x, name: modal.name.trim(), description: (modal.description || "").trim() || undefined } : x
    );
    saveGroups(nextG);
    setModal(null);
    refresh();
    toastSuccess("Group changes saved.");
  };

  const deleteGroup = (id) => {
    if (!confirm("Delete this group and its member links?")) return;
    const target = loadGroups().find((g) => g.id === id);
    saveGroups(loadGroups().filter((g) => g.id !== id));
    saveGroupMembers(loadGroupMembers().filter((m) => m.groupId !== id));
    saveManagerGroups(loadManagerGroups().filter((l) => l.groupId !== id));
    refresh();
    refreshViewerSessionFromGroups();
    toastSuccess(`Group deleted${target ? `: ${target.name}` : ""}.`);
  };

  const platformUsers = loadPlatformUsers();

  const toggleMember = (groupId, kind, refId) => {
    const m = loadGroupMembers();
    const key = (row) =>
      row.groupId === groupId && (kind === "user" ? row.userId === refId && row.employeeId == null : row.employeeId === refId);
    const exists = m.some(key);
    const next = exists ? m.filter((row) => !key(row)) : [...m, kind === "user" ? { groupId, userId: refId } : { groupId, employeeId: refId }];
    saveGroupMembers(next);
    setMembers(next);
    refreshViewerSessionFromGroups();
    toastSuccess(exists ? "Group membership removed." : "Group membership added.");
  };

  const editingId = modal && modal.id != null ? modal.id : null;
  const isGroupModalDirty = (m) => {
    if (!m || !m.__baseline) return false;
    return String(m.name || "").trim() !== String(m.__baseline.name || "").trim() || String(m.description || "").trim() !== String(m.__baseline.description || "").trim();
  };
  const requestCloseGroupModal = () => {
    if (modal && isGroupModalDirty(modal) && !confirmDiscardUnsaved("group editor")) return;
    setModal(null);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <button type="button" onClick={openCreate} style={{ ...primaryBtn, width: "fit-content" }}>
        Create group
      </button>
      <div style={{ fontSize: 12, color: "var(--text-2)" }}>
        What this affects: group membership controls who appears in manager rosters and viewer manager context.
      </div>
      <div style={{ border: "1px solid var(--border)", borderRadius: 10, overflow: "hidden" }}>
        {groups.map((g) => (
          <div
            key={g.id}
            style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", borderBottom: "1px solid var(--border)" }}
          >
            <div>
              <div style={{ fontWeight: 600 }}>{g.name}</div>
              {g.description && <div style={{ fontSize: 12, color: "var(--text-3)" }}>{g.description}</div>}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button type="button" onClick={() => openEdit(g)} style={{ fontSize: 13, fontWeight: 600, color: "var(--primary)" }}>
                Edit
              </button>
              <button type="button" onClick={() => deleteGroup(g.id)} style={{ fontSize: 13, fontWeight: 600, color: "var(--red)" }}>
                Delete
              </button>
            </div>
          </div>
        ))}
      </div>

      {modal && (
        <Modal title={modal.id == null ? "Create group" : "Edit group"} onClose={requestCloseGroupModal} width={520}>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 4 }}>Name</div>
              <input value={modal.name} onChange={(e) => setModal((x) => ({ ...x, name: e.target.value }))} style={inputSx} />
            </div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 4 }}>Description (optional)</div>
              <input value={modal.description || ""} onChange={(e) => setModal((x) => ({ ...x, description: e.target.value }))} style={inputSx} />
            </div>
            {editingId != null && (
              <>
                <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text-3)", marginTop: 4 }}>Platform users</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 160, overflowY: "auto" }}>
                  {platformUsers.map((u) => (
                    <label key={u.id} style={{ fontSize: 14, display: "flex", alignItems: "center", gap: 8 }}>
                      <input
                        type="checkbox"
                        checked={members.some((m) => m.groupId === editingId && m.userId === u.id && m.employeeId == null)}
                        onChange={() => toggleMember(editingId, "user", u.id)}
                      />
                      {u.name} ({u.role})
                    </label>
                  ))}
                </div>
                <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text-3)" }}>Property contacts (employees)</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 200, overflowY: "auto" }}>
                  {EMPLOYEES.map((e) => (
                    <label key={e.id} style={{ fontSize: 14, display: "flex", alignItems: "center", gap: 8 }}>
                      <input
                        type="checkbox"
                        checked={members.some((m) => m.groupId === editingId && m.employeeId === e.id)}
                        onChange={() => toggleMember(editingId, "employee", e.id)}
                      />
                      {e.name} — {e.property}
                    </label>
                  ))}
                </div>
              </>
            )}
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 8 }}>
              <button type="button" onClick={requestCloseGroupModal} style={{ border: "1px solid var(--border)", borderRadius: 8, padding: "8px 16px" }}>
                Cancel
              </button>
              <button type="button" onClick={saveModal} style={primaryBtn}>
                {modal.id == null ? "Create" : "Save"}
              </button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

const AdminManagerGroupsTab = () => {
  const { refreshViewerSessionFromGroups } = useSession();
  const managers = loadPlatformUsers().filter((u) => u.role === "manager");
  const [mgrQuery, setMgrQuery] = useState("");
  const [mgrSort, setMgrSort] = useState("name-asc");
  const [selectedManagerId, setSelectedManagerId] = useState(() => managers[0]?.id ?? null);
  const [links, setLinks] = useState(() => loadManagerGroups());
  const [groupModalOpen, setGroupModalOpen] = useState(false);

  const filteredMgr = managers.filter((m) => {
    if (!mgrQuery.trim()) return true;
    const q = mgrQuery.trim().toLowerCase();
    return (
      (m.name || "").toLowerCase().includes(q) ||
      String(m.email || "")
        .toLowerCase()
        .includes(q) ||
      String(m.managerPartitionId ?? "").includes(q)
    );
  });

  const sortedMgr = [...filteredMgr].sort((a, b) => {
    if (mgrSort === "name-asc") return String(a.name || "").localeCompare(String(b.name || ""));
    if (mgrSort === "name-desc") return String(b.name || "").localeCompare(String(a.name || ""));
    if (mgrSort === "partition") return Number(a.managerPartitionId || 0) - Number(b.managerPartitionId || 0);
    return 0;
  });

  const sel = managers.find((m) => m.id === selectedManagerId);
  const groups = loadGroups();
  const assignedIds = sel ? links.filter((l) => l.managerId === sel.id).map((l) => l.groupId) : [];

  const applyManagerGroups = (groupIds) => {
    if (!sel) {
      toastError("Select a manager first.");
      return;
    }
    const gidSet = new Set(groupIds);
    const rest = links.filter((l) => l.managerId !== sel.id);
    const next = [...rest, ...[...gidSet].map((gid) => ({ managerId: sel.id, groupId: gid }))];
    setLinks(next);
    saveManagerGroups(next);
    setGroupModalOpen(false);
    refreshViewerSessionFromGroups();
    toastSuccess("Manager group assignment saved.");
  };

  return (
    <div style={{ display: "flex", gap: 24, flexWrap: "wrap", alignItems: "flex-start", maxWidth: 960 }}>
      <div style={{ flex: "0 0 280px", minWidth: 220 }}>
        <div style={{ fontWeight: 700, marginBottom: 8, fontSize: 14 }}>Managers</div>
        <input placeholder="Search managers…" value={mgrQuery} onChange={(e) => setMgrQuery(e.target.value)} style={{ ...inputSx, marginBottom: 8 }} />
        <select value={mgrSort} onChange={(e) => setMgrSort(e.target.value)} style={{ ...inputSx, marginBottom: 8 }}>
          <option value="name-asc">Sort: Name A-Z</option>
          <option value="name-desc">Sort: Name Z-A</option>
          <option value="partition">Sort: Partition</option>
        </select>
        <div
          style={{
            border: "1px solid var(--border)",
            borderRadius: 10,
            maxHeight: 440,
            overflowY: "auto",
            background: "var(--surface)",
          }}
        >
          {sortedMgr.map((m) => {
            const active = m.id === selectedManagerId;
            return (
              <button
                key={m.id}
                type="button"
                onClick={() => setSelectedManagerId(m.id)}
                style={{
                  width: "100%",
                  textAlign: "left",
                  padding: "10px 12px",
                  border: "none",
                  borderBottom: "1px solid var(--border)",
                  background: active ? "var(--primary-light)" : "var(--surface)",
                  cursor: "pointer",
                }}
              >
                <div style={{ fontWeight: 600, fontSize: 14 }}>{m.name}</div>
                <div style={{ fontSize: 12, color: "var(--text-3)" }}>Partition {m.managerPartitionId}</div>
              </button>
            );
          })}
          {sortedMgr.length === 0 && <div style={{ padding: 12, color: "var(--text-3)", fontSize: 13 }}>No managers match.</div>}
        </div>
      </div>

      <div style={{ flex: 1, minWidth: 280, background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 10, padding: 20 }}>
        {!sel && <p style={{ color: "var(--text-2)" }}>Select a manager from the list.</p>}
        {sel && (
          <>
            <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 12 }}>{sel.name}</h2>
            <div style={{ display: "grid", gap: 8, fontSize: 14, color: "var(--text-2)", marginBottom: 16 }}>
              <div>
                <span style={{ color: "var(--text-3)", fontWeight: 600 }}>Email</span> {sel.email || "—"}
              </div>
              <div>
                <span style={{ color: "var(--text-3)", fontWeight: 600 }}>SMS to</span> {maskPhone(sel.phone)}
              </div>
              <div>
                <span style={{ color: "var(--text-3)", fontWeight: 600 }}>Partition</span> {sel.managerPartitionId}
              </div>
              <div>
                <span style={{ color: "var(--text-3)", fontWeight: 600 }}>User id</span> {sel.id}
              </div>
            </div>
            <button type="button" onClick={() => setGroupModalOpen(true)} style={{ ...primaryBtn, marginBottom: 16 }}>
              Assign groups from list…
            </button>
            <div style={{ fontSize: 12, color: "var(--text-2)", marginBottom: 12 }}>
              What this affects: this manager's group links control visible property contacts, schedules, and correspondences for that partition.
            </div>
            <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text-3)", marginBottom: 6 }}>Assigned groups ({assignedIds.length})</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {assignedIds.map((gid) => {
                const g = groups.find((x) => x.id === gid);
                return (
                  <span
                    key={gid}
                    style={{ fontSize: 12, padding: "4px 10px", borderRadius: 99, background: "var(--bg)", border: "1px solid var(--border)" }}
                  >
                    {g ? g.name : gid}
                  </span>
                );
              })}
              {assignedIds.length === 0 && <span style={{ fontSize: 13, color: "var(--text-3)" }}>None yet.</span>}
            </div>
          </>
        )}
      </div>

      {groupModalOpen && sel && (
        <AdminSearchableGroupPickModal
          title={`Assign groups — ${sel.name}`}
          initialSelected={assignedIds}
          onClose={() => setGroupModalOpen(false)}
          onSave={applyManagerGroups}
        />
      )}
    </div>
  );
};

                            borderRadius: 8,
                            background: empOpen ? "var(--bg)" : "var(--surface)",
                            cursor: "pointer",
                          }}
                        >
                          {e.name} — {e.property}
                          <span style={{ float: "right", color: "var(--text-3)" }}>{empOpen ? "−" : "+"}</span>
                        </button>
                        {empOpen && (
                          <div style={{ marginTop: 8, paddingLeft: 8 }}>
                            {(() => {
                              const empBroadcasts = BROADCASTS.filter(
                                (b) => employeesForBroadcastRows(b, [e], true).length > 0
                              );
                              if (empBroadcasts.length === 0) {
                                return (
                                  <div style={{ fontSize: 13, color: "var(--text-3)", padding: "8px 6px" }}>
                                    No correspondences yet for this contact. Trigger a report cycle (Broadcast/Schedule) and the thread will appear here.
                                  </div>
                                );
                              }
                              return empBroadcasts.map((b) => (
                                <div key={b.id} style={{ marginBottom: 6 }}>
                                  <button
                                    type="button"
                                    onClick={() => setExpanded(expanded === `${e.id}-${b.id}` ? null : `${e.id}-${b.id}`)}
                                    style={{
                                      width: "100%",
                                      textAlign: "left",
                                      padding: "8px 10px",
                                      fontSize: 13,
                                      border: "1px solid var(--border)",
                                      borderRadius: 8,
                                      background: "var(--bg)",
                                      cursor: "pointer",
                                    }}
                                  >
                                    {b.label} · {b.date}
                                    <span style={{ float: "right", color: "var(--text-3)" }}>{expanded === `${e.id}-${b.id}` ? "∧" : "∨"}</span>
                                  </button>
                                  {expanded === `${e.id}-${b.id}` && (
                                    <div style={{ padding: "10px 8px" }}>
                                      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderRadius: 8, background: "var(--surface)" }}>
                                        <Avatar
                                          initials={e.avatar}
                                          size={30}
                                          color={b.id === 1 && CONVERSATIONS[e.id]?.status === "completed" ? "green" : "amber"}
                                        />
                                        <div style={{ flex: 1, fontSize: 13 }}>
                                          <div style={{ fontWeight: 600 }}>{e.name}</div>
                                          <div style={{ color: "var(--text-3)" }}>{e.property}</div>
                                        </div>
                                        <StatusPill status={b.id === 1 ? CONVERSATIONS[e.id]?.status ?? "pending" : "completed"} />
                                        <button
                                          type="button"
                                          disabled={!CONVERSATIONS[e.id]}
                                          onClick={() => {
                                            if (!CONVERSATIONS[e.id]) return;
                                            const log = FULL_LOGS[e.id] || makeFallbackLog(e.id);
                                            setLogModal({ empId: e.id, log });
                                          }}
                                          style={{
                                            fontSize: 12,
                                            color: CONVERSATIONS[e.id] ? "var(--primary)" : "var(--text-3)",
                                            fontWeight: 600,
                                            padding: "5px 12px",
                                            borderRadius: 6,
                                            border: `1px solid ${CONVERSATIONS[e.id] ? "var(--primary)" : "var(--border)"}`,
                                            background: CONVERSATIONS[e.id] ? "var(--primary-light)" : "var(--surface)",
                                            cursor: CONVERSATIONS[e.id] ? "pointer" : "not-allowed",
                                            opacity: CONVERSATIONS[e.id] ? 1 : 0.75,
                                          }}
                                        >
                                          View Log →
                                        </button>
                                      </div>
                                    </div>
                                  )}
                                </div>
                              ));
                            })()}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
      {logModal && <LogModal log={logModal.log} empId={logModal.empId} onClose={() => setLogModal(null)} />}
    </div>
  );
};
